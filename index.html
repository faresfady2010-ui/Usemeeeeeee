<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Usemee Bot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial; background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh;}
.chat {width:420px; height:650px; background:#1e1e2f; border-radius:10px; display:flex; flex-direction:column;}
#chat-box {flex:1; overflow:auto; padding:10px;}
.msg {margin:5px; padding:8px; border-radius:10px;}
.user {background:#2e86de; text-align:right;}
.bot {background:#444;}
.input {display:flex;}
input {flex:1; padding:10px;}
button {padding:10px;}
canvas {background:white; border-radius:10px; margin-top:10px;}
</style>
</head>

<body>

<div class="chat">
<div id="chat-box"></div>

<div class="input">
<input id="input" placeholder="Ask about any stock...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>
</div>

<script>

// ================= API =================
const KEY = "YOUR_FINNHUB_KEY";

// ================= MEMORY =================
let lastCompany = "";

// ================= DETECT COMPANY =================
function extractCompany(text){
    return text.toLowerCase()
        .replace("stock","")
        .replace("price","")
        .trim();
}

// ================= GET SYMBOL (SMART SEARCH) =================
async function getSymbol(name){
    const res = await fetch(`https://finnhub.io/api/v1/search?q=${name}&token=${KEY}`);
    const data = await res.json();

    if(data.result && data.result.length > 0){
        return data.result[0].symbol;
    }
    return null;
}

// ================= PRICE =================
async function getPrice(symbol){
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${KEY}`);
    return await res.json();
}

// ================= HISTORY =================
async function getHistory(symbol){
    const now = Math.floor(Date.now()/1000);
    const week = now - (7*24*60*60);

    const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=D&from=${week}&to=${now}&token=${KEY}`);
    return await res.json();
}

// ================= SMART ANALYSIS =================
function explainMove(price){

    let text = "";

    if(price.dp > 2){
        text = "📈 Strong upward movement — likely positive news, earnings, or demand.";
    } 
    else if(price.dp < -2){
        text = "📉 Drop detected — could be bad news, market fear, or profit-taking.";
    } 
    else {
        text = "➡️ Stable movement — market is neutral.";
    }

    text += "\n\n💡 Stocks move due to:\n- Earnings\n- News\n- Market trends\n- Investor sentiment";

    return text;
}

// ================= CHART =================
function drawChart(data){

    const ctx = document.createElement("canvas");
    document.getElementById("chat-box").appendChild(ctx);

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.t.map(()=> ""),
            datasets: [{
                data: data.c
            }]
        }
    });
}

// ================= BOT =================
async function process(input){

    let company = extractCompany(input);

    if(!company && lastCompany){
        company = lastCompany;
    }

    const symbol = await getSymbol(company);

    if(!symbol){
        return "❌ Company not found. Try another name.";
    }

    lastCompany = company;

    const price = await getPrice(symbol);
    const history = await getHistory(symbol);

    drawChart(history);

    return `
📊 ${company.toUpperCase()} (${symbol})

💰 ${price.c} USD
📈 ${price.h} / 📉 ${price.l}
📊 Change: ${price.dp}%

${explainMove(price)}
`;
}

// ================= UI =================
function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("chat-box").appendChild(div);

    // Voice output
    speak(text);
}

// ================= VOICE OUTPUT =================
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// ================= SEND =================
async function send(){

    const input = document.getElementById("input").value;
    if(!input) return;

    add(input, "user");
    document.getElementById("input").value = "";

    add("Thinking...", "bot");

    const reply = await process(input);

    document.getElementById("chat-box").lastChild.remove();

    add(reply, "bot");
}

// ================= VOICE INPUT =================
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

function startVoice(){
    rec.start();
}

rec.onresult = e => {
    document.getElementById("input").value = e.results[0][0].transcript;
    send();
};

// INIT
add("🚀 Advanced stock AI ready. Ask anything!", "bot");

</script>

</body>
</html>
