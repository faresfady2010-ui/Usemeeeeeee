// Typo-tolerant similarity
let lastTopic = "";

function levenshteinDistance(a, b){
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));

    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(
                matrix[i-1][j]+1,
                matrix[i][j-1]+1,
                matrix[i-1][j-1]+cost
            );
        }
    }
    return matrix[b.length][a.length];
}

function similarity(s1,s2){
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();

    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;

    if(longer.length===0) return 1.0;

    return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

// ================= GNEWS API - FREE NEWS =================
function fetchNews(keyword = "") {
    const query = encodeURIComponent(keyword || "business");
    const url = `https://gnews.io/api/v4/search?q=${query}&lang=en&max=10&token=${GNEWS_API_KEY}`;
    
    return fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.articles && data.articles.length > 0) {
                let newsText = `📰 **Latest ${keyword ? keyword : "Business"} News:**\n\n`;
                data.articles.slice(0, 5).forEach((article, index) => {
                    newsText += `${index + 1}. ${article.title}\n`;
                    newsText += `   🔗 Source: ${article.source.name}\n`;
                    newsText += `   ${article.description ? article.description.substring(0, 80) + "..." : ""}\n\n`;
                });
                return newsText;
            }
            return `No news found for "${keyword}".`;
        })
        .catch(error => {
            console.error("GNews Error:", error);
            return "📰 News service temporarily unavailable. Try: 'What is business?' or 'How to start a business?'";
        });
}

// ================= FINANCIAL MODELING PREP - STOCK DATA (FREE DEMO) =================
function analyzeStockMovement(company, symbol) {
    const quoteUrl = `https://financialmodelingprep.com/api/v3/quote/${symbol}?apikey=${FMP_API_KEY}`;
    
    return fetch(quoteUrl)
        .then(response => response.json())
        .then(data => {
            let analysis = `📊 **${symbol} - ${company.toUpperCase()}**\n\n`;
            
            if (Array.isArray(data) && data.length > 0) {
                const quote = data[0];
                analysis += `💰 **Price Data:**\n`;
                analysis += `Current: $${quote.price ? quote.price.toFixed(2) : 'N/A'}\n`;
                analysis += `Open: $${quote.open ? quote.open.toFixed(2) : 'N/A'}\n`;
                analysis += `High: $${quote.high ? quote.high.toFixed(2) : 'N/A'}\n`;
                analysis += `Low: $${quote.low ? quote.low.toFixed(2) : 'N/A'}\n`;
                analysis += `Previous Close: $${quote.previousClose ? quote.previousClose.toFixed(2) : 'N/A'}\n\n`;
                
                const change = quote.price && quote.previousClose ? quote.price - quote.previousClose : null;
                const pctChange = quote.changePercent || 0;
                if (change !== null) {
                    analysis += `📈 **Change:**\n`;
                    analysis += `Change: ${change.toFixed(2)} (${pctChange.toFixed(2)}%)\n`;
                    analysis += `${change > 0 ? '📈 Trending UP' : '📉 Trending DOWN'}\n\n`;
                }
                
                analysis += `💡 **Disclaimer:** Always do your own research before investing!\n`;
                analysis += `📍 Data powered by Financial Modeling Prep (Demo)\n`;
            } else {
                analysis += `Unable to fetch real-time data. Please try:\n`;
                analysis += `• Google Finance: finance.google.com\n`;
                analysis += `• Yahoo Finance: finance.yahoo.com\n`;
                analysis += `• TradingView: tradingview.com\n`;
            }
            
            return analysis;
        })
        .catch(error => {
            console.error("Financial Modeling Prep Error:", error);
            return `📊 Stock data service unavailable.\n\nFor live data visit:\n• finance.google.com\n• yahoo.com/finance`;
        });
}

function resolveContext(text){
    if((text.includes("it") || text.includes("this") || text.includes("that")) && lastTopic){
        return lastTopic;
    }
    return text;
}

        const context = resolveContext(userInput);

        if(typeof intents !== "undefined"){
            for(const intent of intents){
                for(const pattern of intent.patterns){
                    const score = similarity(userInput, pattern);
                    if(score > bestScore){

        if(userInput.includes("purpose") && (userInput.includes("business") || lastTopic === "business")){

Example business ideas:

                return `You're asking about how related to ${lastTopic}.

Try: "how to start ${lastTopic}"`;
            }

        if(userInput.includes("what")){

function typeText(div,text,speed=20){
    if(!text) text = "Error";

    div.textContent="";
    let i=0;

    const interval=setInterval(()=>{
        if(i < text.length){
            div.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(interval);
        }
    },speed);
}

function addMessage(text,sender,id=null){
    const chatBox=document.getElementById('chat-box');
    const msgDiv=document.createElement('div');

    msgDiv.classList.add('message',sender);
    if(id) msgDiv.id=id;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop=chatBox.scrollHeight;

    typeText(msgDiv,text,20);
}
function openPage(page){
    console.log("Navigating to:", page);
    window.location.href=page;
}
function sendMessage() {
    const input = $("#user-input").val().trim();
    if (!input) return;

    addMessage(input, 'user');
    $("#user-input").val("");

    const loadingId = "msg-" + Date.now();
    addMessage("Thinking...", 'bot', loadingId);

    setTimeout(() => {
        const questions = input.toLowerCase().split(/and|[\.\?]/g).filter(q => q.trim().length > 2);
        
        let finalReply = "";
        
        if (questions.length > 1) {
            const replies = questions.map(q => getBotReply(q.trim()));
            finalReply = replies.join("\n\n---\n\n"); 
        } else {
            finalReply = getBotReply(input);
        }
        
        if (typeof finalReply === 'object' && finalReply.isStockAnalysis) {
            analyzeStockMovement(finalReply.company, finalReply.symbol).then(result => {
                const msgDiv = document.getElementById(loadingId);
                msgDiv.innerHTML = "";
                typeText(msgDiv, result, 20);
            });
            return;
        }
        else if (typeof finalReply === 'object' && finalReply.isNews) {
            fetchNews(finalReply.keyword).then(result => {
                const msgDiv = document.getElementById(loadingId);
                msgDiv.innerHTML = "";
                typeText(msgDiv, result, 20);
            });
            return;
        }

        const msgDiv = document.getElementById(loadingId);
        msgDiv.innerHTML = "";
        typeText(msgDiv, finalReply, 20);
        
        if (typeof speakResponse === "function") {
            speakResponse(finalReply.replace(/-/g, "")); 
        }
    }, 500 + Math.random() * 800);
}

$("#user-input").on('keypress',function(e){if(e.key==='Enter') sendMessage();});

$("#suggestBtn").click(()=>$("#suggestBox").toggle());
$("#closeBtn").click(()=>$("#suggestBox").hide());
$(".suggestion").click(function(){
    $("#user-input").val($(this).text()); sendMessage(); $("#suggestBox").hide();
});

if(localStorage.getItem('darkMode')==='enabled') document.body.classList.add('dark');

window.onload=()=>{
    addMessage("Hello! I'm your AI assistant 🤖. Ask me about business, finance, marketing, or entrepreneurship.",'bot',null,true);
}
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.add("listening");
    };

    recognition.onend = () => {
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.remove("listening");
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("user-input").value = transcript;
        sendMessage();
    };

    recognition.onerror = function(e) {
        console.error("Voice error:", e.error);
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.remove("listening");
    };
}

function startVoice(){
    if(recognition){
        recognition.start();
    } else {
        alert("Speech recognition not supported in this browser");
    }
}
</script>
