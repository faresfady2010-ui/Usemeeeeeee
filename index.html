let lastTopic = "";

function levenshteinDistance(a, b){
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));
    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;
    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(matrix[i-1][j]+1, matrix[i][j-1]+1, matrix[i-1][j-1]+cost);
        }
    }
    return matrix[b.length][a.length];
}

function similarity(s1,s2){
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();
    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;
    if(longer.length===0) return 1.0;
    return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

async function fetchNews(keyword = "") {
    try {
        const query = keyword || "business";
        const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&language=en&pageSize=5&apiKey=${NEWSAPI_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.articles && data.articles.length > 0) {
            let newsText = `📰 Latest ${keyword ? keyword : "Business"} News:\n\n`;
            data.articles.slice(0, 5).forEach((article, index) => {
                newsText += `${index + 1}. **${article.title}**\n`;
                newsText += `   📅 ${new Date(article.publishedAt).toLocaleDateString()}\n`;
                newsText += `   🔗 Source: ${article.source.name}\n`;
                newsText += `   ${article.description ? article.description.substring(0, 100) + "..." : ""}\n\n`;
            });
            return newsText;
        } else {
            return `No news found for "${keyword}". Try a different search term.`;
        }
    } catch (error) {
        console.error("NewsAPI Error:", error);
        return "Sorry, I couldn't fetch news at the moment.";
    }
}

async function analyzeStockMovement(company, symbol) {
    try {
        const newsUrl = `https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=2026-04-01&to=2026-04-04&token=${FINNHUB_KEY}`;
        const newsResponse = await fetch(newsUrl);
        const newsData = await newsResponse.json();
        const businessNewsUrl = `https://newsapi.org/v2/everything?q=${encodeURIComponent(company + " stock")}&sortBy=publishedAt&language=en&pageSize=3&apiKey=${NEWSAPI_KEY}`;
        const businessResponse = await fetch(businessNewsUrl);
        const businessData = await businessResponse.json();
        let analysis = `📊 **${company.toUpperCase()} Stock Analysis**\n\n`;
        if (newsData && newsData.length > 0) {
            analysis += `📉 **Recent Developments:**\n\n`;
            newsData.slice(0, 3).forEach((item, idx) => {
                analysis += `${idx + 1}. ${item.headline}\n`;
                analysis += `   Source: ${item.source}\n`;
                analysis += `   ${item.summary ? item.summary.substring(0, 120) + "..." : ""}\n\n`;
            });
        }
        if (businessData.articles && businessData.articles.length > 0) {
            analysis += `\n💡 **Why It Moved:**\n\n`;
            const articles = businessData.articles.slice(0, 3);
            let positiveSignals = 0;
            let negativeSignals = 0;
            let headlines = "";
            articles.forEach((article, idx) => {
                const text = (article.title + " " + article.description).toLowerCase();
                if (text.includes("surge") || text.includes("soar") || text.includes("rally") || 
                    text.includes("gain") || text.includes("profit") || text.includes("grow")) {
                    positiveSignals++;
                }
                if (text.includes("drop") || text.includes("fall") || text.includes("decline")) {
                    negativeSignals++;
                }
                headlines += `${idx + 1}. ${article.title}\n`;
            });
            analysis += headlines + "\n";
            if (negativeSignals > positiveSignals) {
                analysis += `⚠️ **Market Sentiment:** Negative\n`;
            } else if (positiveSignals > negativeSignals) {
                analysis += `✅ **Market Sentiment:** Positive\n`;
            } else {
                analysis += `➡️ **Market Sentiment:** Mixed\n`;
            }
        }
        return analysis;
    } catch (error) {
        console.error("Stock Analysis Error:", error);
        return `Unable to fetch analysis for ${company}.`;
    }
}

                isStockAnalysis: true, 
                company: mentionedCompany,
                symbol: companySymbols[mentionedCompany]
            };
        }

        if (userInput.includes("news") || userInput.includes("latest")) {
            let keyword = "business";
            if (userInput.includes("tech")) keyword = "technology";
            return { isNews: true, keyword: keyword };
        }

        if(userInput.includes("and why") || userInput === "why?"){
            return "Because understanding this helps make better decisions!";
        }

        const context = resolveContext(userInput);
        let bestIntent = null;
        let bestScore = 0;

        for(const intent of intents){
            for(const pattern of intent.patterns){
                const score = similarity(userInput, pattern);
                if(score > bestScore){
                    bestScore = score;
                    bestIntent = intent;
                }
            }
        }

        if(bestScore > 0.55 && bestIntent){
            return bestIntent.responses[Math.floor(Math.random()*bestIntent.responses.length)];
        }

        return "I'm not sure about that. Try asking: 'What is business?' or 'How to start a business?'";
    } catch(error){
        console.error(error);
        return "Something went wrong ⚠️";
    }
}

function typeText(div,text,speed=20){
    if(!text) text = "Error";
    div.textContent="";
    let i=0;
    const interval=setInterval(()=>{
        if(i < text.length){
            div.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(interval);
        }
    },speed);
}

function addMessage(text,sender,id=null){
    const chatBox=document.getElementById('chat-box');
    const msgDiv=document.createElement('div');
    msgDiv.classList.add('message',sender);
    if(id) msgDiv.id=id;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop=chatBox.scrollHeight;
    typeText(msgDiv,text,20);
}

function openPage(page){
    console.log("Navigating to:", page);
    window.location.href=page;
}

function sendMessage() {
    const input = $("#user-input").val().trim();
    if (!input) return;
    addMessage(input, 'user');
    $("#user-input").val("");
    const loadingId = "msg-" + Date.now();
    addMessage("Thinking...", 'bot', loadingId);
    setTimeout(async () => {
        let finalReply = getBotReply(input);
        
        if (typeof finalReply === 'object' && finalReply.isStockAnalysis) {
            finalReply = await analyzeStockMovement(finalReply.company, finalReply.symbol);
        } else if (typeof finalReply === 'object' && finalReply.isNews) {
            finalReply = await fetchNews(finalReply.keyword);
        }
        
        const msgDiv = document.getElementById(loadingId);
        msgDiv.innerHTML = "";
        typeText(msgDiv, finalReply, 20);
    }, 500 + Math.random() * 800);
}

$("#user-input").on('keypress',function(e){if(e.key==='Enter') sendMessage();});
$("#suggestBtn").click(()=>$("#suggestBox").toggle());
$("#closeBtn").click(()=>$("#suggestBox").hide());
$(".suggestion").click(function(){
    $("#user-input").val($(this).text());
    sendMessage();
    $("#suggestBox").hide();
});

if(localStorage.getItem('darkMode')==='enabled') document.body.classList.add('dark');

window.onload=()=>{
    addMessage("Hello! I'm your AI assistant 🤖. Ask me about business!","bot",null,true);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.add("listening");
    };

    recognition.onend = () => {
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.remove("listening");
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("user-input").value = transcript;
        sendMessage();
    };

    recognition.onerror = function(e) {
        console.error("Voice error:", e.error);
        const btn = document.getElementById("voice-btn");
        if(btn) btn.classList.remove("listening");
    };
}

function startVoice(){
    if(recognition){
        recognition.start();
    } else {
        alert("Speech recognition not supported");
    }
}
