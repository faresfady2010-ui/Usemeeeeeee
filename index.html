{tag:"due_diligence_property",patterns:["what is due diligence in real estate?","how do i do due diligence on a property?","what should i check before buying commercial property?"],responses:["Property due diligence checklist: title search (any liens or disputes?), structural survey, local market analysis, planning history (any restrictions?), environmental assessment (contamination risk?), tenant covenants (commercial), service charge review, and reviewing all leases. Don't skip any — issues found post-purchase become your problem. 🔍","Common due diligence failures: not reviewing the actual lease (tenants have rights that affect your plans), missing structural issues (survey is not optional), ignoring local planning policy (affects development potential), and underestimating refurbishment costs. Spend on professional surveys — they cost far less than hidden surprises. 📋"]},

// ============================================================
// BLOCK 20: TECHNOLOGY & DIGITAL BUSINESS
// ============================================================
{tag:"saas_business_model",patterns:["how does the saas business model work?","why is saas a good business model?","what makes a good saas product?"],responses:["SaaS (Software as a Service) delivers software via subscription rather than one-time purchase. Revenue is recurring (monthly/annual contracts), CAC is paid once but LTV extends years, and software can serve millions of customers with minimal marginal cost. It's the highest-margin business model ever invented. 💡","SaaS business model metrics: ARR (Annual Recurring Revenue), MRR (Monthly Recurring Revenue), Churn Rate, Net Revenue Retention (NRR — are customers expanding?), and CAC:LTV ratio. An NRR above 100% means existing customers grow revenue even with no new customers. 📊"]},
{tag:"platform_business",patterns:["what is a platform business model?","how do platform businesses work?","examples of platform companies?"],responses:["Platform businesses connect two or more user groups — they don't own the inventory, they create the marketplace. Amazon connects buyers and sellers. Airbnb connects hosts and guests. Uber connects drivers and riders. The platform captures value from facilitating transactions. 🔄","Platform businesses benefit from network effects — the more users on one side, the more value for the other side. This creates winner-takes-most dynamics. But they're incredibly hard to start (the chicken-and-egg problem: sellers won't join without buyers; buyers won't join without sellers). 📈"]},
{tag:"api_economy",patterns:["what is the api economy?","how do businesses use apis?","what is api-first business strategy?"],responses:["The API economy: businesses expose their functionality as APIs (Application Programming Interfaces) that other developers can build on. Stripe, Twilio, and SendGrid built multi-billion dollar businesses by making one function (payments, SMS, email) available via API to other developers. 💻","API-first strategy: build your core product as an API first, then build your own user interface on top of it. This creates flexibility (others can build on your API), encourages ecosystem development, and makes your product more defensible. 🔄"]},
{tag:"cloud_computing_business",patterns:["what is cloud computing for business?","should i move my business to the cloud?","what are the benefits of cloud for business?"],responses:["Cloud computing for business: instead of owning servers, you rent computing resources (storage, processing, software) from providers like AWS, Azure, or Google Cloud. Benefits: lower capital cost, scale instantly, pay only for what you use, and access from anywhere. ☁️","Cloud migration benefits: no hardware maintenance, automatic software updates, disaster recovery built-in, and ability to scale globally overnight. Risks: internet dependency, vendor lock-in, data security considerations, and potentially higher ongoing costs than owned infrastructure at very large scale. 📊"]},
{tag:"data_privacy_business",patterns:["how do i protect customer data?","what data privacy laws apply to my business?","what is a privacy-first business strategy?"],responses:["Data privacy laws: GDPR (EU/UK), CCPA (California), PIPEDA (Canada), LGPD (Brazil) — many countries now have their own. Core principle in all: collect only what you need, use it only for stated purposes, protect it, and give people control over their data. 🔐","Privacy-first business strategy: collect minimal data, be transparent about how it's used, store it securely, and make it easy for customers to access or delete their data. Privacy is increasingly a competitive differentiator — customers trust privacy-respecting companies more. 🌟"]},
{tag:"marketplace_business",patterns:["how do i build a marketplace business?","what is a two-sided marketplace?","how do marketplaces make money?"],responses:["Marketplace business models: commission (% of each transaction — Airbnb takes 15-20%), listing fees (charge sellers to list — eBay), subscription (charge buyers or sellers for access), and featured placement (charge for premium visibility). Most successful marketplaces use a combination. 📊","Marketplace challenge: the cold-start problem. You need supply (sellers) to attract demand (buyers) and demand to attract supply. Solve it by manually recruiting your first 10-50 sellers, then building the minimum buyer experience to prove demand exists. eBay started in a single product category (collectables). 💡"]},
{tag:"subscription_business",patterns:["how do i build a subscription business?","what makes a good subscription model?","how do i reduce subscription churn?"],responses:["Subscription business success factors: the product must deliver recurring value (not a one-time need), pricing must be compelling relative to the time/money saved, onboarding must be excellent (the first 30 days predict retention), and expansion revenue must exist (annual upgrades, usage tiers). 📊","Reducing subscription churn: monthly cohort churn analysis (which users leave and why), exit surveys (understand real reasons — they're often different from assumed ones), win-back campaigns (cancelled users who've had time to miss you), and annual billing (annual subscribers churn at 30-50% less than monthly). 🎯"]},
{tag:"fintech_business",patterns:["what is fintech?","how do fintech companies work?","how do i start a fintech business?"],responses:["Fintech (Financial Technology) uses technology to improve financial services — payments (Stripe, Square), lending (LendingClub), investing (Robinhood, eToro), insurance (Lemonade), and banking (Revolut, Monzo). It's one of the fastest-growing startup sectors globally. 💳","Starting a fintech business: heavily regulated (you'll need banking licences, payment licences, or partnerships with licenced institutions depending on your service). The regulatory path is the first challenge — partner with an existing bank via a Banking-as-a-Service (BaaS) platform rather than building regulatory infrastructure from scratch. ⚖️"]},
{tag:"no_code_business",patterns:["can i build a business without coding?","what are no-code tools?","how do no-code tools work for business?"],responses:["No-code tools let non-technical founders build products: Webflow (websites), Bubble (web apps), Glide (mobile apps from spreadsheets), Zapier (automations), Airtable (database apps), Notion (internal tools), and Shopify (e-commerce). You can build an MVP without a single developer. 🛠️","No-code businesses that work well: marketplaces (built on Bubble), SaaS tools (Bubble + Stripe), content sites (Webflow), internal tools (Notion/Airtable), and automation services (Zapier consulting). The limitation: complex, high-scale products eventually outgrow no-code. Start no-code; migrate when necessary. 💡"]},

// ============================================================
// BLOCK 21: PERSONAL DEVELOPMENT FOR BUSINESS
// ============================================================
{tag:"time_management_business",patterns:["how do i manage my time better as a business owner?","what time management systems work for entrepreneurs?","how do i stop wasting time at work?"],responses:["Time management for business owners: block time for deep work (strategic thinking, high-impact projects), batch administrative tasks (email, calls, approvals) into designated time slots, audit your calendar weekly, and ruthlessly eliminate commitments that don't serve your goals. ⏰","The most underused time management tool: delegation. If a task can be done 80% as well by someone else, delegate it. Your time is worth the most when applied to decisions only you can make. Protect it accordingly. 🎯"]},
{tag:"reading_for_business",patterns:["what books should every entrepreneur read?","how do i learn business without a degree?","how do i stay current in business?"],responses:["Essential business reading: 'Zero to One' (Peter Thiel), 'The Lean Startup' (Eric Ries), 'Good to Great' (Jim Collins), 'Thinking Fast and Slow' (Kahneman), 'The Hard Thing About Hard Things' (Ben Horowitz), 'Poor Charlie's Almanack' (Charlie Munger). Each will change how you think. 📚","Learning business without a degree: read obsessively (1 book/week is achievable), listen to business podcasts (How I Built This, Masters of Scale, Acquired), find mentors, build something (the fastest learning), and study case studies of businesses in your industry. Formal education teaches frameworks; experience teaches judgment. 🎯"]},
{tag:"networking_strategy",patterns:["how do i network effectively?","how do i build a professional network?","networking tips for entrepreneurs?"],responses:["Effective networking: give before you ask (share relevant articles, make introductions for others, offer your expertise), be genuinely curious about other people, follow up within 24 hours of meeting someone, and maintain relationships (not just activate them when you need something). 🤝","The most powerful networking principle: quality over quantity. 50 genuine relationships with senior people in your field are worth more than 5,000 LinkedIn connections. Invest in depth — regular check-ins, genuine interest, tangible help — with a small number of key people. 🌟"]},
{tag:"mentorship",patterns:["how do i find a business mentor?","how does mentorship work?","why is having a mentor important?"],responses:["Finding a mentor: identify people whose careers or businesses you admire, study their public work thoroughly, approach them with specific questions (not 'will you mentor me?'), provide value where you can (share something useful), and be respectful of their time. Make it easy to say yes. 🌟","Mentor relationship tips: come prepared (specific questions, not generic conversation), implement their advice (show it mattered), report back on outcomes, and be a great mentee (the best mentors invest most in those who take action). A good mentor can compress decades of learning into years. 💡"]},
{tag:"self_discipline",patterns:["how do i become more disciplined as an entrepreneur?","how do i build good business habits?","how do i stay motivated when running a business?"],responses:["Self-discipline for entrepreneurs: systems beat willpower. Build routines (morning routine, weekly planning ritual, quarterly review), remove friction from desired behaviours, and add friction to distractions. Willpower is finite; good habits are automatic. 💪","Motivation is unreliable — it fluctuates with mood, energy, and external events. Discipline is the ability to act without motivation. Build it by starting small (5 minutes of focused work), committing publicly, tracking streaks, and showing up on the hard days when you least want to. 🌟"]},
{tag:"work_life_balance",patterns:["how do i maintain work life balance as a business owner?","is work life balance possible for entrepreneurs?","how do i avoid burnout as a founder?"],responses:["Work-life balance for entrepreneurs: the traditional conception doesn't apply — building a business requires bursts of intense focus. The goal is more sustainable. Protect personal time intentionally (schedule it like a meeting), set non-negotiable minimums (exercise, sleep, family time), and recognise the long-term cost of chronic overwork. 💙","Burnout prevention: recognise that fatigue makes everything harder (decisions, relationships, creativity). The ROI on rest is positive. Weekly 'shutdown rituals' (review the week, plan next week, then close all work apps) create a genuine mental break that makes the next week more productive. 🧠"]},
{tag:"stoicism_business",patterns:["how does stoicism apply to business?","what can entrepreneurs learn from stoicism?","what is the stoic approach to business?"],responses:["Stoic business principles: control what you can control (effort, attitude, values), accept what you cannot (market conditions, competitor actions, economic cycles), and focus on the long term. Marcus Aurelius, Ryan Holiday's 'The Obstacle is the Way' — the obstacle becomes the path. 🏛️","Stoic practice for entrepreneurs: negative visualisation (imagine losing your biggest client — what would you do? This preparation reduces panic when it happens), daily reflection (what went well and why?), and separating your self-worth from your business results. You are not your company. 💡"]},
{tag:"goal_setting_business",patterns:["how do i set business goals?","what is the okr framework?","how do i set smart goals?"],responses:["OKR framework (Objectives and Key Results): set 3-5 ambitious Objectives (qualitative aspirational goals), then define 3 Key Results per Objective (quantitative, measurable outcomes). Review quarterly. OKRs keep teams aligned and focused. Used by Google, Intel, and LinkedIn. 🎯","SMART goals: Specific (clear what, who, where), Measurable (quantified outcome), Achievable (ambitious but possible), Relevant (linked to bigger strategy), Time-bound (deadline creates urgency). SMART prevents vague goals ('grow revenue') and makes accountability possible ('grow ARR from $1M to $2M by December 31'). 📊"]},

// ============================================================
// BLOCK 22: SOCIAL MEDIA BUSINESS
// ============================================================
{tag:"linkedin_for_business",patterns:["how do i use linkedin for business?","how do i get leads on linkedin?","how do i grow my linkedin profile?"],responses:["LinkedIn for business: optimise your profile (headline = who you help + how, not just your job title), post 3x/week with genuine insights, engage in comments on your target audience's posts, and use LinkedIn Sales Navigator for targeted prospecting. 💼","LinkedIn content that works in 2025: personal stories with a business lesson (highest engagement), contrarian takes on industry consensus, data and research with original analysis, and honest 'here's what I got wrong' posts. Authenticity beats corporate speak every time. 🎯"]},
{tag:"instagram_business",patterns:["how do i use instagram for business?","how do i grow my business on instagram?","what content works on instagram?"],responses:["Instagram for business: Reels drive reach (the algorithm heavily favours short video), Stories build intimacy (behind-the-scenes, polls, Q&As), and grid posts establish brand credibility. Post Reels 4-5x/week for maximum reach, Stories daily. 📱","Instagram content strategy: show your process (how you make the product), share customer transformations (before/after results), educate your audience (tips in your expertise area), and be consistent with visual branding (same colour palette, filters, style). Recognisable brands get remembered. 🎨"]},
{tag:"youtube_business",patterns:["how do i use youtube for business?","should my business have a youtube channel?","how do i start a business youtube channel?"],responses:["YouTube for business: the highest ROI content marketing channel for long-form educational content. How-to videos rank in Google search (YouTube is Google's second-largest search engine), stay relevant for years (evergreen content), and establish deep authority. 🎬","YouTube business strategy: focus on search-optimised titles (what people actually type into YouTube search), create comprehensive tutorials (longer = more watch time = more algorithmic love), and include calls to action to your email list (YouTube owns the relationship; you should too). 📊"]},
{tag:"tiktok_business",patterns:["should my business be on tiktok?","how do i use tiktok for business?","what types of business do well on tiktok?"],responses:["TikTok for business: enormous organic reach potential (especially for new accounts), entertainment-first content wins (education wrapped in entertainment), and authenticity massively outperforms polished production. You don't need a big budget — you need a good hook in the first 2 seconds. 📱","Businesses that thrive on TikTok: food and beverage (process videos, recipes), beauty and skincare (transformations, tutorials), fitness, fashion, and any business with a visual process or behind-the-scenes story. B2B is harder but growing — LinkedIn TikTok-style content is now a real trend. 🎬"]},
{tag:"influencer_marketing",patterns:["how does influencer marketing work?","should i work with influencers?","how do i find the right influencers for my brand?"],responses:["Influencer marketing: pay or incentivise people with established audiences to promote your product. Mega influencers (1M+) give reach; micro influencers (10K-100K) give higher engagement rates and niche relevance. Micro influencer campaigns often deliver better ROI. 📱","Finding influencers: Instagram's native search, tools like AspireIQ, Creator.co, or Upfluence, or simply look at who your target customers already follow. Always check: authentic engagement (real comments, not bot likes), content quality, and brand alignment. An influencer with 50K genuine fans in your niche beats 1M irrelevant followers. 🎯"]},
{tag:"content_calendar",patterns:["how do i create a content calendar?","what is a content calendar?","how do i plan social media content?"],responses:["Content calendar basics: plan 2-4 weeks ahead, mix content types (educational, entertaining, promotional — the 80/20 rule: 80% value, 20% promotion), assign ownership for each piece, and review performance monthly to adjust what you create. 📅","Content planning tools: Notion or Airtable (build your own), Buffer or Hootsuite (scheduling + calendar built in), Later (great for Instagram planning), or CoSchedule (marketing-focused). The best tool is the one your team will actually use — start simple. 🛠️"]},
{tag:"social_media_analytics",patterns:["what social media metrics should i track?","how do i measure social media success?","what is a good engagement rate?"],responses:["Key social media metrics: Reach (how many people saw it), Engagement Rate (likes+comments+shares ÷ reach — above 3% is good), Click-through Rate (how many clicked to your website), and Conversion Rate (how many became customers). Vanity metrics (follower count) matter less than these. 📊","Engagement rate benchmarks by platform: Instagram 1-5% (above 5% is excellent), TikTok 5-10%+, LinkedIn 2-4%, Twitter/X 0.5-1%. Compare your rate to your category/size — not global averages. A 10K-follower account should have higher engagement rates than a 1M-follower account. 🎯"]},
{tag:"email_list_building",patterns:["how do i build an email list?","why is an email list important for business?","how do i grow subscribers fast?"],responses:["Building an email list: create a valuable lead magnet (free guide, template, checklist, mini-course — something genuinely useful in exchange for an email), place opt-ins prominently on your website, and promote the lead magnet everywhere you have an audience. 📧","Email list vs social followers: you OWN your email list. Social platforms change algorithms, ban accounts, and can disappear. Email is a direct line to your audience that no platform can take away. Build your list aggressively from day one — it's your most valuable marketing asset. 🌟"]},

// ============================================================
// BLOCK 23: INTERNATIONAL BUSINESS
// ============================================================
{tag:"import_export_basics",patterns:["how does importing and exporting work?","what do i need to know about import export?","how do i start an import export business?"],responses:["Import/export basics: understand Incoterms (who's responsible for shipping, insurance, and customs at each stage — FOB, CIF, DDP are most common), customs duties (tariffs on imports), and the required documentation (commercial invoice, packing list, certificate of origin, bill of lading). 🌍","Starting import/export: identify your product and target market, find a freight forwarder (they handle customs and logistics), research tariffs and regulations in both countries, and use trade finance products (letters of credit) for large first orders to protect both parties. 📦"]},
{tag:"joint_venture_international",patterns:["what is an international joint venture?","how do i enter a foreign market through a joint venture?","what are the risks of international joint ventures?"],responses:["International joint ventures: partnering with a local company to enter a foreign market. The local partner provides market knowledge, relationships, and regulatory navigation; you provide capital, technology, or product. JVs reduce entry risk and speed market access. 🤝","JV risks: misaligned objectives, cultural differences in decision-making, profit distribution disputes, and technology/IP transfer risks. Mitigate with a robust JV agreement, clear governance, and performance milestones that trigger exit rights if targets aren't met. ⚖️"]},
{tag:"currency_risk",patterns:["what is currency risk in business?","how do i manage foreign exchange risk?","how does currency fluctuation affect business?"],responses:["Currency risk: if you earn in one currency but have costs in another, exchange rate movements directly affect your profitability. A UK company selling in USD loses margin if the dollar weakens. This is called transaction risk. 📊","Managing currency risk: invoice in your home currency where possible, use forward contracts (lock in today's exchange rate for future transactions), options (right to buy at a set rate), or natural hedging (match revenue and costs in the same currency). Most small businesses accept the risk; larger ones hedge systematically. 💰"]},
{tag:"cultural_business_differences",patterns:["how does culture affect international business?","what cultural differences should i know for business?","how do i avoid cultural mistakes in business?"],responses:["Key cultural differences affecting business: relationship vs transactional (Asian/Middle Eastern cultures build relationships before doing business; US/German culture gets straight to business), hierarchy (some cultures require senior-level involvement at every stage), directness (some cultures say no indirectly), and time orientation (attitude to deadlines and punctuality varies enormously). 🌍","Research before entering any new market: Geert Hofstede's Cultural Dimensions model is the most widely used framework — it scores countries on power distance, individualism, uncertainty avoidance, and time orientation. Understanding these prevents expensive cultural missteps. 📚"]},
{tag:"trade_agreements",patterns:["what are trade agreements?","how do trade agreements affect business?","what is the world trade organization?"],responses:["Trade agreements reduce or eliminate tariffs and other barriers between countries — making cross-border trade cheaper and faster. Examples: USMCA (US-Canada-Mexico), EU Single Market, CPTPP (Asia-Pacific), UK-EU TCA. They significantly affect your cost structure if you trade internationally. 📊","WTO (World Trade Organization): the global body that sets international trade rules, resolves disputes, and negotiates agreements between 164 member countries. Its 'most favoured nation' principle means trade benefits given to one member must be given to all — a foundation of global trade. 🌍"]},

// ============================================================
// BLOCK 24: SUSTAINABILITY & ESG
// ============================================================
{tag:"esg_business",patterns:["what is esg in business?","how does esg affect companies?","should my business focus on esg?"],responses:["ESG (Environmental, Social, Governance): a framework for evaluating how companies manage environmental impact, social responsibility, and governance quality. Investors, customers, and employees increasingly use ESG to evaluate companies — poor ESG scores affect access to capital and talent. 🌍","ESG in practice: Environmental (carbon footprint, waste, energy use), Social (employee wellbeing, supply chain ethics, community impact), Governance (board diversity, executive pay, transparency, anti-corruption). Large investors (BlackRock, Vanguard) now actively engage on ESG — it's no longer optional for public companies. 📊"]},
{tag:"carbon_footprint_business",patterns:["how do i calculate my business carbon footprint?","how do i reduce my business carbon emissions?","what is net zero for business?"],responses:["Business carbon footprint: Scope 1 (direct emissions — your buildings, fleet), Scope 2 (indirect — electricity you buy), Scope 3 (value chain — suppliers, employee travel, customer use of product). Most companies' largest footprint is Scope 3. 🌿","Net zero strategy: measure your baseline (use a carbon accounting tool like Watershed, Persefoni, or Normative), reduce where possible (renewable energy, efficient operations), and offset the remainder (high-quality carbon credits). Net zero is not just an offset — reduction must come first. 🎯"]},
{tag:"sustainable_business",patterns:["how do i make my business more sustainable?","what is a sustainable business model?","how does sustainability create business value?"],responses:["Sustainable business practices create value: reduce energy costs (efficiency saves money), attract purpose-driven customers (sustainable brands command premiums), retain values-aligned employees (talent increasingly chooses purpose-driven employers), and reduce regulatory risk (ahead of inevitable regulation). 🌿","Sustainability as strategy: Patagonia, Interface, and Unilever show that integrating sustainability into the core business model creates competitive advantage, not just cost. 'Purpose + profit' is not a contradiction — increasingly, it's the most durable strategy. 🌍"]},
{tag:"circular_economy",patterns:["what is a circular economy?","how does circular economy apply to business?","what is the difference between linear and circular economy?"],responses:["Circular economy: products are designed to be reused, repaired, refurbished, or recycled — eliminating waste. vs Linear economy (take-make-dispose). Businesses adopting circular models reduce material costs, create new revenue streams (repair services, rental models), and appeal to eco-conscious customers. 🔄","Circular business examples: Caterpillar (remanufactures engines — lower cost, lower waste), Rent the Runway (rental fashion — no ownership waste), Patagonia Worn Wear (sell pre-owned Patagonia gear), and Interface (carpet tiles designed for full recyclability). The circular model is also often more profitable. 💡"]},
{tag:"b_corporation",patterns:["what is a b corporation?","how do i become a b corp?","what are the benefits of b corp certification?"],responses:["B Corporation (B Corp) certification: awarded to companies that meet rigorous standards for social and environmental performance, transparency, and accountability. Certified by B Lab. It's the 'Fair Trade' of business certification — signal that the company genuinely operates ethically. 🌟","B Corp benefits: brand differentiation (trust signal to customers), talent attraction (mission-driven employees), community (network of 7,000+ certified companies), and access to sustainable investment. Certification requires scoring 80+ on the B Impact Assessment and paying an annual fee based on revenue. 📋"]},

// ============================================================
// BLOCK 25: OPERATIONS & PROCESS MANAGEMENT
// ============================================================
{tag:"lean_methodology",patterns:["what is lean methodology?","how does lean apply to business?","what is lean thinking?"],responses:["Lean methodology (from Toyota): eliminate waste (anything that doesn't add value for the customer), continuously improve (Kaizen — small incremental improvements every day), and respect people (the team closest to the work knows it best). Lean applies to manufacturing, service, and tech businesses. ⚙️","Lean tools: Value Stream Mapping (visualise the full process, identify waste), 5S (Sort, Set in order, Shine, Standardise, Sustain — workplace organisation), Kanban (visual workflow), and Root Cause Analysis (5 Whys — ask why five times to find the real cause of a problem). 🔄"]},
{tag:"six_sigma",patterns:["what is six sigma?","how does six sigma work?","what is dmaic methodology?"],responses:["Six Sigma: a data-driven methodology for eliminating defects and reducing process variation. Targets 3.4 defects per million opportunities (six standard deviations). Used in manufacturing, healthcare, finance, and services. 📊","DMAIC process: Define (problem and goals), Measure (current performance baseline), Analyse (root causes of defects), Improve (implement solutions), Control (sustain improvements). Six Sigma practitioners are certified as Yellow, Green, or Black Belts. 🎯"]},
{tag:"process_improvement",patterns:["how do i improve business processes?","what is process mapping?","how do i create standard operating procedures?"],responses:["Process improvement methodology: 1. Map the current process (every step, decision point, and handoff) 2. Identify waste and bottlenecks 3. Design the ideal process 4. Test with a pilot 5. Implement and measure 6. Continuously refine. Never skip the mapping step — you can't improve what you haven't understood. 🔄","SOPs (Standard Operating Procedures): document how every repeatable task should be done. Great SOPs are: specific enough to follow without asking questions, visual (screenshots, flowcharts), owned by one person, and reviewed quarterly. SOPs let businesses scale without depending on specific people. 📋"]},
{tag:"kpis_metrics",patterns:["what are kpis?","how do i choose the right kpis?","how do i measure business performance?"],responses:["KPIs (Key Performance Indicators) are quantified measures of whether you're achieving your most important business objectives. Good KPIs: directly linked to strategy, measurable with available data, actionable (you can change them), and timely (available fast enough to make decisions). 📊","KPI selection mistake: measuring what's easy (activity metrics like calls made, posts published) rather than what matters (output metrics like meetings booked, leads generated). Lead with outcomes, not activity. A sales team with high call volume but poor conversion has a quality problem, not a quantity problem. 🎯"]},
{tag:"agile_business",patterns:["what is agile methodology?","how does agile work outside of tech?","how do i apply agile to my business?"],responses:["Agile: an iterative approach that delivers value incrementally rather than all at once. Sprints (2-4 week cycles), daily standups, retrospectives, and continuous feedback replace long 'waterfall' delivery cycles. Originated in software but applied across marketing, HR, finance, and operations. 🔄","Agile for non-tech businesses: marketing agencies use sprint planning to manage campaign cycles; finance teams use agile to deliver monthly close processes more efficiently; product teams in any industry use it to test and iterate quickly. The core principle — deliver fast, learn, adjust — applies everywhere. 💡"]},
{tag:"bottleneck_analysis",patterns:["what is a bottleneck in business?","how do i find bottlenecks in my business?","what is the theory of constraints?"],responses:["A bottleneck is the single slowest step in a process that limits the output of the entire system. You cannot produce faster than your bottleneck allows — speeding up any other step just creates more queue in front of the bottleneck. 🔍","Theory of Constraints (Goldratt): identify the constraint (the bottleneck), exploit it (maximise its throughput), subordinate everything else to it (don't optimise non-bottleneck steps), elevate it (invest to increase its capacity), then repeat (find the new constraint). Every system has one. ⚙️"]},
{tag:"outsourcing_decisions",patterns:["how do i decide what to outsource?","what should businesses outsource?","make vs buy decision in business?"],responses:["Outsource when: the activity is not a core competency (you're not differentiated by doing it yourself), a specialist can do it better and/or cheaper, it's a commodity activity (payroll, legal, accounting, cleaning), or the volume doesn't justify a full-time hire. 📋","Make vs buy framework: does this activity give us competitive advantage? If yes, keep in-house. If no, outsource. Amazon outsources cleaning; they don't outsource cloud infrastructure (AWS is their competitive advantage). Define your core before deciding what to outsource. 🎯"]},
{tag:"inventory_jit",patterns:["what is just in time inventory?","how does jit inventory work?","what are the risks of just in time?"],responses:["Just-in-Time (JIT) inventory: receive materials/products only when needed for production or sale — minimising inventory holding costs. Pioneered by Toyota. JIT reduces working capital tied up in stock but requires precise demand forecasting and reliable suppliers. ⚙️","JIT risks: supply chain disruptions are catastrophic when there's no buffer stock (as COVID-19 demonstrated globally). Many companies are now moving to 'just-in-case' models with more strategic buffer inventory. Balance lean operations with resilience — they're not mutually exclusive. 📦"]},
{tag:"quality_management",patterns:["what is total quality management?","how do i improve quality in my business?","what is iso 9001?"],responses:["Total Quality Management (TQM): a management approach where quality is everyone's responsibility — from design through delivery. Key principles: customer focus, continuous improvement, fact-based decision-making, and employee involvement. It's a culture, not a department. 🌟","ISO 9001: the international quality management standard. Certification demonstrates that your processes meet consistent quality standards — required by many large enterprise customers. The certification process also forces you to document and improve your processes, which has value regardless of the badge. 📋"]},

// ============================================================
// BLOCK 26: DECISION MAKING & PROBLEM SOLVING
// ============================================================
{tag:"decision_frameworks",patterns:["how do i make better business decisions?","what decision-making frameworks exist?","how do i decide when i am unsure?"],responses:["Decision frameworks: Pros/Cons (simple), Decision Matrix (score options against weighted criteria), Expected Value (probability × outcome), Pre-mortem (imagine the decision failed — what went wrong?), and Jeff Bezos's 2x2 (reversible vs irreversible × big vs small). Use the simplest framework that fits the decision's importance. 📊","The most important decision habit: distinguish reversible from irreversible decisions. Be fast on reversible ones (you can undo them); be slow and careful on irreversible ones (hiring, partnerships, major capital commitments). Most startups fail by being too slow on reversible decisions. 💡"]},
{tag:"problem_solving_business",patterns:["how do i solve business problems?","what is the best problem solving method?","how do i think through a business problem?"],responses:["Problem-solving framework: Define (what exactly is the problem? not the symptom), Diagnose (root cause — use 5 Whys or fishbone diagram), Generate options (at least 3 different approaches), Evaluate (pros/cons, risks, resources required), Decide, Act, Measure. Never skip the diagnosis step. 🔍","McKinsey MECE principle: when solving problems, structure your analysis so categories are Mutually Exclusive (no overlaps) and Collectively Exhaustive (no gaps). This prevents both double-counting and missing something important. A powerful mental discipline for any complex problem. 📊"]},
{tag:"root_cause_analysis",patterns:["what is root cause analysis?","how do i find the root cause of a business problem?","what are the 5 whys?"],responses:["Root Cause Analysis (RCA): systematically identifying the underlying cause of a problem, not just the symptom. The 5 Whys technique: ask 'why' five times. 'Sales dropped' → Why? 'Fewer calls' → Why? 'Rep was sick' → Why? 'No coverage plan' → Why? 'No backup system' → Root cause: absence of a coverage protocol. 🔍","RCA tools: 5 Whys (simple, conversational), Fishbone/Ishikawa Diagram (visualises multiple potential causes across 6 categories: People, Process, Technology, Materials, Environment, Management), and Failure Mode Analysis (systematic pre-emptive approach). Always fix the root cause, not the symptom. ⚙️"]},
{tag:"strategic_planning",patterns:["how do i do strategic planning?","what is a strategic plan?","how do i create a 3 year business plan?"],responses:["Strategic planning: define where you want to be in 3-5 years (vision), assess your current reality (SWOT, market analysis), identify the key choices you need to make (strategic priorities), build a roadmap of initiatives, and establish KPIs to measure progress. Review annually, adjust quarterly. 🎯","Strategic planning mistake: confusing strategy with a budget. A budget is a financial plan; a strategy is a set of choices about where to compete and how to win. 'Grow revenue by 30% by hiring 5 more salespeople' is an operational plan. 'Win SMB market through self-serve product' is a strategy. 📊"]},
{tag:"scenario_planning",patterns:["what is scenario planning in business?","how do i plan for uncertainty?","how do i prepare for different futures?"],responses:["Scenario planning: develop 3-4 plausible futures (not predictions) and design robust strategies that work reasonably well across all scenarios. Used by Shell in the 1970s to anticipate the oil crisis. Prevents being blindsided by strategic surprise. 🔭","Scenario planning steps: identify key uncertainties (macro forces outside your control), develop distinct scenarios (each built around different combinations of these uncertainties), assess how your business performs in each, and identify 'no regret' moves (good in any scenario) and hedging bets (good in specific scenarios). 🎯"]},

// ============================================================
// BLOCK 27: CHANGE MANAGEMENT
// ============================================================
{tag:"change_management",patterns:["what is change management?","how do i manage organisational change?","why do change initiatives fail?"],responses:["Change management: the structured approach to transitioning people, teams, and organisations from a current state to a desired future state. 70% of change initiatives fail — almost always because of people issues (resistance, lack of leadership commitment, poor communication), not technical ones. 🔄","Change management model (Kotter 8-step): create urgency, build a coalition, form a vision, communicate it, empower action, generate quick wins, sustain acceleration, and anchor change in culture. Each step matters — organisations that skip urgency creation never overcome inertia. 📋"]},
{tag:"resistance_to_change",patterns:["how do i overcome resistance to change?","why do employees resist change?","how do i get buy-in for changes?"],responses:["Why people resist change: fear of the unknown, loss of current competence (I'm good at the old way, will I be good at the new?), job security concerns, lack of trust in leadership, and insufficient communication. Resistance is rational — acknowledge it rather than dismiss it. 🧠","Overcoming resistance: involve people in designing the change (those who build it support it), communicate the 'why' relentlessly (not just what will change, but why it must), celebrate early adopters, address fears directly rather than avoiding them, and show empathy — change is genuinely hard. 💡"]},
{tag:"mergers_acquisitions",patterns:["how do mergers and acquisitions work?","what is due diligence in m&a?","why do acquisitions fail?"],responses:["M&A process: identify target, sign NDA, receive information memorandum, conduct due diligence (financial, legal, commercial, operational review), make an offer, negotiate terms, sign SPA (Sale and Purchase Agreement), obtain regulatory approvals, close, then integrate. Each stage has landmines. 💼","Why acquisitions fail: 70-90% fail to deliver expected value. Common reasons: overpaying (winner's curse), cultural misalignment (often the deadliest), overestimating synergies, underestimating integration complexity, and key talent leaving post-close. The deal is easy; the integration is the hard part. ⚠️"]},
{tag:"post_merger_integration",patterns:["how do i integrate an acquired company?","what is post-merger integration?","how do i retain employees after an acquisition?"],responses:["Post-merger integration (PMI): the most critical phase of any acquisition. First 100 days are decisive — communicate the combined vision quickly, make leadership decisions (uncertainty kills productivity), integrate systems with a clear timeline, and protect the acquired company's culture if that's what you bought. 🔄","Retaining acquired employees: communicate clearly what changes and what doesn't, involve key people in integration planning, match or exceed compensation packages, identify and personally engage with 'critical talent' you can't afford to lose, and move fast on cultural decisions — ambiguity is the enemy. 💙"]},

// ============================================================
// BLOCK 28: BUSINESS ETHICS & GOVERNANCE
// ============================================================
{tag:"corporate_governance",patterns:["what is corporate governance?","how does corporate governance work?","what makes good corporate governance?"],responses:["Corporate governance: the system of rules, practices, and processes by which a company is directed and controlled. It balances the interests of shareholders, management, customers, suppliers, and the community. Good governance prevents fraud, improves decision-making, and builds investor trust. 🏛️","Good governance elements: an independent board, clear separation of CEO and Chairman roles, audit committee with financial expertise, transparent financial reporting, executive compensation aligned with long-term performance, and strong whistleblower protections. Governance failures (Enron, Wirecard) cost shareholders billions. 📋"]},
{tag:"whistleblower_policy",patterns:["what is a whistleblower policy?","how do i create a speak-up culture?","how do i handle internal ethics violations?"],responses:["Whistleblower policy: formal process allowing employees to report misconduct (fraud, safety violations, discrimination, illegal activity) without fear of retaliation. Required by law in many jurisdictions. Anonymous reporting channels (hotlines, online portals) significantly increase reporting rates. 📋","Speak-up culture: beyond the policy, create an environment where raising concerns is celebrated rather than punished. Leadership must visibly respond to reports, protect reporters, and take action — otherwise the policy is just paper and employees learn that speaking up is dangerous. ⚖️"]},
{tag:"anti_bribery",patterns:["what are anti-bribery laws?","how do i prevent corruption in my business?","what is the foreign corrupt practices act?"],responses:["Key anti-bribery legislation: FCPA (US Foreign Corrupt Practices Act) — prohibits bribing foreign officials; UK Bribery Act — broader scope, covers private sector bribery, has 'corporate offence' (company liable if employee bribes, even without company knowledge). Extraterritorial reach — applies to your business globally if you have US or UK connections. ⚖️","Anti-corruption compliance programme: written anti-bribery policy, risk assessment, due diligence on third parties (agents, distributors, JV partners are highest risk), gifts and hospitality policy, training, and internal reporting channel. Document everything — in an investigation, the quality of your compliance programme affects the outcome. 📋"]},
{tag:"business_ethics_framework",patterns:["what is business ethics?","how do i build an ethical business?","what ethical frameworks apply to business?"],responses:["Business ethics frameworks: Consequentialist (judge actions by outcomes — does this create the most good?), Deontological (judge by rules — are we keeping our obligations and duties?), Virtue ethics (what would a person of good character do?). Most ethical business decisions apply elements of all three. ⚖️","Building ethical culture: ethics starts at the top. What leaders do in ambiguous situations — when no one is watching, when it costs money — defines the culture more than any policy. The 'tone at the top' is not a metaphor. Every major corporate scandal has its roots in a leadership culture that tolerated or incentivised unethical behaviour. 🌟"]},

// ============================================================
// BLOCK 29: ACCOUNTING STANDARDS & TAX
// ============================================================
{tag:"gaap_ifrs",patterns:["what is gaap?","what is ifrs?","what is the difference between gaap and ifrs?"],responses:["GAAP (Generally Accepted Accounting Principles): US accounting standards set by FASB. IFRS (International Financial Reporting Standards): used in 140+ countries, set by IASB. Key differences: inventory valuation (LIFO allowed under GAAP, not IFRS), lease accounting, and revenue recognition details. 📊","Public companies must use GAAP (US) or IFRS (most other countries). Private companies have more flexibility. If you plan to raise investment or sell to a larger company, you'll eventually need GAAP or IFRS-compliant financials — start clean from the beginning. 📋"]},
{tag:"tax_planning",patterns:["what is business tax planning?","how do i legally reduce my business taxes?","what is the difference between tax avoidance and tax evasion?"],responses:["Tax planning: structuring your business activities to minimise your legal tax liability. Legitimate strategies: maximising deductions, timing income and expenses, choosing the right business structure, using tax credits (R&D, investment), and utilising loss carry-forwards. 💰","Tax avoidance (legal) vs Tax evasion (illegal): avoidance uses legal means to reduce taxes (buying equipment to get a deduction); evasion hides income or falsifies records (cash-in-hand without declaring). The line matters enormously — evasion is a criminal offence with serious penalties. ⚖️"]},
{tag:"transfer_pricing",patterns:["what is transfer pricing?","how does transfer pricing work?","why is transfer pricing controversial?"],responses:["Transfer pricing: the prices set for transactions between related companies in different countries. If a UK parent charges its US subsidiary a high royalty fee, profits shift from the high-tax US to the lower-tax UK. Tax authorities require transfer prices to be at 'arm's length' (what unrelated parties would charge). 📊","Transfer pricing is among the most scrutinised areas of international tax. Companies like Google, Apple, and Amazon have faced billions in transfer pricing challenges from tax authorities. For multinational businesses, specialist transfer pricing advice is essential — non-compliance risks are enormous. ⚖️"]},
{tag:"vat_gst",patterns:["what is vat?","what is gst?","how does value added tax work for businesses?"],responses:["VAT (Value Added Tax) / GST (Goods and Services Tax): a consumption tax collected at each stage of production and distribution, but ultimately borne by the end consumer. Businesses charge it on sales, reclaim it on purchases, and remit the net to the government. 🧾","VAT compliance: register once you exceed the registration threshold (UK: £90,000 turnover, EU varies by country). Charge the correct VAT rate (standard, reduced, or zero), file returns on time, maintain VAT records for at least 6 years, and handle cross-border transactions carefully — the rules are complex. 📋"]},

// ============================================================
// BLOCK 30: WEALTH & FINANCIAL FREEDOM
// ============================================================
{tag:"financial_freedom",patterns:["what is financial freedom?","how do i achieve financial independence?","what is the fire movement?"],responses:["Financial independence: having enough assets/income to cover your living expenses without needing to work. The FIRE movement (Financial Independence, Retire Early) targets a portfolio 25× annual expenses (the 4% safe withdrawal rate rule). At that point, investment returns sustain lifestyle indefinitely. 💰","FIRE variants: LeanFIRE (minimal lifestyle), FatFIRE (maintain high lifestyle), BaristaFIRE (part-time work + investments). For business owners: sell the business, invest proceeds, or build passive income streams. The path is simple (earn more, spend less, invest the difference) but requires extraordinary discipline. 📊"]},
{tag:"building_wealth",patterns:["how do i build wealth through a business?","how do wealthy business owners think about money?","what is the wealth creation mindset?"],responses:["Wealth building through business: own equity (not just a salary), reinvest profits into assets (not lifestyle), build a business that can run without you (the value is in the system, not your time), and eventually sell or dividend the accumulated value. The employee-owner wealth gap is almost entirely explained by equity ownership. 💰","Wealthy business owner mindset: invest first (pay yourself last), value assets over income (passive income from assets beats active income from work), think in decades not quarters, and build systems that generate wealth while you sleep. Wealth is stored value — the more value you've created, the more you can store. 🌟"]},
{tag:"exit_strategy",patterns:["how do i exit my business?","what are my options when selling a business?","how do i value my business to sell it?"],responses:["Business exit options: trade sale (sell to a strategic buyer or private equity), management buyout (sell to your management team), IPO (list on a stock exchange — rare), family succession (pass to children/relatives), employee ownership trust (sell to employees — tax benefits in UK), or wind down. 💼","Business sale process: prepare financials (3 years of clean accounts), get a business valuation (typically 3-8× EBITDA for SMBs, higher for SaaS), appoint an M&A advisor (they run the process), approach qualified buyers, conduct due diligence, negotiate, and close. Start preparing 2-3 years before you want to sell. 📊"]},
{tag:"private_equity",patterns:["what is private equity?","how does private equity work?","what happens when private equity buys a company?"],responses:["Private equity (PE): investment firms that acquire companies using a combination of equity and debt (leveraged buyouts), improve operations and/or growth, then sell after 3-7 years for a return. PE is attracted to: strong cash flow, market leadership, and management teams willing to stay. 💰","When PE buys your company: expect focus on EBITDA improvement (cost reduction and revenue growth), increased reporting requirements, debt on the balance sheet (reduces financial flexibility), and a clear exit plan. Management typically receives equity (aligned incentives). PE ownership can be transformative — or extractive — depending on the firm. ⚠️"]},
{tag:"dividends_business",patterns:["how should i pay myself dividends?","what are dividends in a private company?","dividend vs salary which is better for business owner?"],responses:["Dividends (UK/most jurisdictions): distributions of after-tax profit to shareholders. Taxed at lower rates than salary in most countries (UK dividend tax: 8.75%/33.75%/39.35% vs income tax 20%/40%/45%). Combining salary + dividends is often the most tax-efficient structure for owner-managers. 💰","Dividend vs salary for business owners: salary provides pension contributions and employment rights; dividends are more tax-efficient above the salary threshold. The optimal mix depends on your jurisdiction, company profitability, and personal tax situation. Consult a tax advisor — the rules change regularly. 📊"]},
{tag:"angel_investing",patterns:["what is angel investing?","how do i become an angel investor?","what do angel investors look for?"],responses:["Angel investing: investing personal capital (typically $10K-$500K per deal) into early-stage startups in exchange for equity. Angels accept high failure rates (70-80% of deals return nothing) because the successful ones return 10-100×. Diversification across 20+ deals is recommended. 💰","What angels look for: exceptional founders (more than the idea), large addressable market (must be able to become a big business), unfair advantage (why this team?), early traction (evidence of demand), and a clear path to returns (how will they eventually sell?). 🎯"]},
];

function generatePlan() {
planData.name = document.getElementById('planName')?.value || '';
planData.startDate = document.getElementById('startDate')?.value || '';
planData.endDate = document.getElementById('endDate')?.value || '';
planData.initialBudget = parseFloat(document.getElementById('initialBudget')?.value) || 0;
planData.growthRate = parseFloat(document.getElementById('growthRate')?.value) || 0;
planData.type = document.getElementById('planType')?.value || 'revenue';

if (!planData.name || !planData.startDate || !planData.endDate || !planData.initialBudget) {
alert('❌ Please fill all fields');
return;
}

calculateMonths();
generateMonthlyProjections();
displayMetrics();
generateCharts();
generateDataTable();
alert('✅ Plan generated!');
}

function calculateMonths() {
const start = new Date(planData.startDate);
const end = new Date(planData.endDate);
planData.months = [];
let current = new Date(start);
let monthIndex = 0;

while (current <= end) {
const monthName = current.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
const shortMonthName = current.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });

planData.months.push({
monthIndex: monthIndex,
date: new Date(current),
monthName: monthName,
shortMonthName: shortMonthName,
budget: 0,
expense: 0,
revenue: 0,
profit: 0
});
current.setMonth(current.getMonth() + 1);
monthIndex++;
}
}

function generateMonthlyProjections() {
let currentAmount = planData.initialBudget;
planData.totalProjection = 0;

planData.months.forEach((month) => {
const growth = (planData.growthRate / 100);
currentAmount = currentAmount * (1 + growth);

switch(planData.type) {
case 'revenue':
month.revenue = Math.round(currentAmount);
month.budget = Math.round(currentAmount * 0.7);
month.expense = Math.round(currentAmount * 0.4);
month.profit = month.revenue - month.expense;
break;
case 'investment':
month.budget = Math.round(currentAmount);
month.revenue = Math.round(currentAmount * 0.08);
month.profit = month.revenue;
break;
default:
month.budget = Math.round(currentAmount);
}

planData.totalProjection += month.budget;
});
}

function displayMetrics() {
const metricsGrid = document.getElementById('metricsGrid');
if (!metricsGrid) return;

metricsGrid.innerHTML = '';

const finalMonth = planData.months[planData.months.length - 1] || {};

const metrics = [
{ label: 'Total', value: '$' + planData.totalProjection.toLocaleString(), icon: '📊' },
{ label: 'Average', value: '$' + Math.round(planData.totalProjection / planData.months.length).toLocaleString(), icon: '💰' },
{ label: 'Duration', value: planData.months.length + 'mo', icon: '📅' },
{ label: 'Final', value: '$' + (finalMonth.budget || 0).toLocaleString(), icon: '🎯' },
{ label: 'Growth Rate', value: planData.growthRate + '%', icon: '📈' },
{ label: 'ROI Est.', value: Math.round((planData.totalProjection / (planData.initialBudget * planData.months.length)) * 100) + '%', icon: '💹' }
];

metrics.forEach((metric) => {
const card = document.createElement('div');
card.className = 'metric-card';
card.innerHTML = `<div class="metric-icon">${metric.icon}</div><div class="metric-label">${metric.label}</div><div class="metric-value">${metric.value}</div>`;
metricsGrid.appendChild(card);
});
}

function showBreakEvenCalc() {
const display = document.getElementById('calcDisplay');
display.innerHTML = `
<h3>Break-Even Calculator</h3>

`;

function calculateBreakEven() {
const fixed = parseFloat(document.getElementById('fixedCosts').value) || 0;
const variable = parseFloat(document.getElementById('variableCost').value) || 0;
const price = parseFloat(document.getElementById('sellingPrice').value) || 0;

if (price <= variable) {
document.getElementById('breakEvenResult').innerHTML = '<p style="color: red;">Selling price must be higher than variable cost.</p>';
return;
}

const contribution = price - variable;
const units = Math.ceil(fixed / contribution);
const revenue = units * price;

document.getElementById('breakEvenResult').innerHTML = `
<div class="report-section">
<p><strong>Break-Even Point:</strong> ${units.toLocaleString()} units</p>
<p><strong>Revenue Needed:</strong> $${revenue.toLocaleString()}</p>
<p><strong>Contribution Margin:</strong> $${contribution.toFixed(2)} per unit</p>
</div>
`;
}

function showLoanCalc() {
const display = document.getElementById('calcDisplay');
display.innerHTML = `
<h3>Loan Calculator</h3>
<div class="input-group">
<label>Loan Amount ($)</label>

</div>

<label>Loan Term (Years)</label>
<input type="number" id="loanTerm" placeholder="5">
</div>
<button class="btn btn-primary" onclick="calculateLoan()">Calculate</button>
<div id="loanResult" style="margin-top: 15px;"></div>
`;
}

function calculateLoan() {
const amount = parseFloat(document.getElementById('loanAmount').value) || 0;
const rate = (parseFloat(document.getElementById('interestRate').value) || 0) / 100 / 12;
const term = (parseFloat(document.getElementById('loanTerm').value) || 0) * 12;

if (amount === 0 || rate === 0 || term === 0) {
document.getElementById('loanResult').innerHTML = '<p style="color: red;">Please fill all fields.</p>';
return;
}

const payment = (amount * rate * Math.pow(1 + rate, term)) / (Math.pow(1 + rate, term) - 1);
const total = payment * term;
const interest = total - amount;

document.getElementById('loanResult').innerHTML = `
<div class="report-section">
<p><strong>Monthly Payment:</strong> $${payment.toFixed(2)}</p>
<p><strong>Total Interest:</strong> $${interest.toFixed(2)}</p>
<p><strong>Total Amount:</strong> $${total.toFixed(2)}</p>
</div>
`;
}

function calculateTax() {

const expenses = parseFloat(document.getElementById('deductibles').value) || 0;

const tax = taxable * rate;

<div class="report-section">
<p><strong>Taxable Income:</strong> $${taxable.toLocaleString()}</p>
<p><strong>Estimated Tax:</strong> $${tax.toFixed(2)}</p>
<p><strong>After Tax:</strong> $${(taxable - tax).toFixed(2)}</p>
</div>
`;
}

function levenshteinDistance(a, b) {
const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));
for(let i=0;i<=b.length;i++) matrix[i][0]=i;
for(let j=0;j<=a.length;j++) matrix[0][j]=j;
for(let i=1;i<=b.length;i++) {
for(let j=1;j<=a.length;j++) {
const cost = a[j-1]===b[i-1]?0:1;
matrix[i][j] = Math.min(matrix[i-1][j]+1, matrix[i][j-1]+1, matrix[i-1][j-1]+cost);
}
}
return matrix[b.length][a.length];
}

function similarity(s1,s2) {
s1 = s1.toLowerCase();
s2 = s2.toLowerCase();
const longer = s1.length > s2.length ? s1 : s2;
const shorter = s1.length > s2.length ? s2 : s1;
if(longer.length===0) return 1.0;
return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

function parseFinancialAmount(value) {
  if (!value) return null;
  let text = value.toLowerCase().replace(/,/g, '').trim();
  let multiplier = 1;
  if (text.match(/billion|bn/)) multiplier = 1000;
  else if (text.match(/million|m/)) multiplier = 1;
  else if (text.match(/thousand|k/)) multiplier = 0.001;
  text = text.replace(/(billion|million|thousand|bn|m|k)/g, '').replace(/[^0-9.]/g, '');
  const number = parseFloat(text);
  return isNaN(number) ? null : number * multiplier;
}

function extractFinancialValues(text) {
  const result = { revenue: null, expenses: null };
  const revenueRegex = /(revenue|income|sales)\s*(?:is|=|:?|of)?\s*\$?\s*([0-9,.]+\s*(?:billion|million|thousand|bn|m|k)?)/gi;
  const expenseRegex = /(expense|expenses|cost|costs)\s*(?:is|=|:?|of)?\s*\$?\s*([0-9,.]+\s*(?:billion|million|thousand|bn|m|k)?)/gi;
  let match;
  while ((match = revenueRegex.exec(text)) !== null) {
    result.revenue = parseFinancialAmount(match[2]) || result.revenue;
  }
  while ((match = expenseRegex.exec(text)) !== null) {
    result.expenses = parseFinancialAmount(match[2]) || result.expenses;
  }
  return result;
}

function predictProfitLoss(text) {
  const values = extractFinancialValues(text);
  if (values.revenue !== null && values.expenses !== null) {
    const profit = values.revenue - values.expenses;
    const margin = values.revenue > 0 ? ((profit / values.revenue) * 100).toFixed(1) : '0.0';
    const amount = Math.abs(profit).toLocaleString(undefined, { maximumFractionDigits: 2 });
    const verdict = profit >= 0 ? 'profit' : 'loss';
    const advice = profit >= 0
      ? 'This looks healthy, but keep watching expenses as the business scales.'
      : 'This shows a loss, so you should lower costs or increase revenue to move toward profitability.';
    return `Based on revenue of $${values.revenue.toLocaleString()} and expenses of $${values.expenses.toLocaleString()}, this scenario results in a ${verdict} of $${amount} (${margin}% margin). ${advice}`;
  }
  if (values.revenue !== null && values.expenses === null) {
    return `I can estimate profit or loss if you tell me expenses. Right now I only see revenue of $${values.revenue.toLocaleString()}.`;
  }
  if (values.expenses !== null && values.revenue === null) {
    return `I can estimate profit or loss if you tell me revenue. Right now I only see expenses of $${values.expenses.toLocaleString()}.`;
  }
  if (text.match(/predict|estimate|forecast|calculate|profit|loss/)) {
    return 'To predict profit or loss, I need both revenue and expense values. Profit = Revenue - Expenses.';
  }
  return null;
}

      translations[lang] && translations[lang].botResponses && translations[lang].botResponses[intent.tag]) {
    return translations[lang].botResponses[intent.tag];

}

function respondWithIntent(intent, userInput) {
  updateConversationContext(intent);
  if (intent.tag === 'idea_generator') return generateIdeaReply();
  if (intent.tag === 'stock_lookup') { setTimeout(() => showStockModal(), 800); return intent.responses[0]; }
  if (intent.tag === 'guided_business_creation') return startBusinessCreationFlow();
  return getLocalizedResponse(intent);
}

function getBotReply(input) {
let rawInput = input.toLowerCase().trim();
let userInput = resolvePronouns(rawInput);

// Profit prediction
const predictionTrigger = /(predict|estimate|forecast|calculate|profit or loss|profit forecast|loss forecast|will i make a profit|will i have a loss)/;
const prediction = predictProfitLoss(userInput);
if (prediction && (predictionTrigger.test(userInput) || /\d/.test(userInput))) {
  return prediction;
}

// Business comparison
if (userInput.includes('compare') && (userInput.includes('business') || userInput.includes('company') || userInput.includes('companies'))) {
  showBusinessComparison(userInput);
  return "🔍 Analyzing businesses for comparison...";
}

// ---- PASS 1: Exact match ----
for (const intent of intents) {
  for (const pattern of intent.patterns) {
    if (userInput === pattern.toLowerCase()) {
      return respondWithIntent(intent, userInput);
    }
  }
}

// ---- PASS 2: Pattern is contained in user input ----
for (const intent of intents) {
  for (const pattern of intent.patterns) {
    if (userInput.includes(pattern.toLowerCase())) {
      return respondWithIntent(intent, userInput);
    }
  }
}

// ---- PASS 3: User input is contained in pattern ----
for (const intent of intents) {
  for (const pattern of intent.patterns) {
    if (pattern.toLowerCase().includes(userInput) && userInput.length > 4) {
      return respondWithIntent(intent, userInput);
    }
  }
}

// ---- PASS 4: Word-level overlap ----
const userWords = userInput.split(/\s+/).filter(w => w.length > 3);
let bestWordIntent = null;
let bestWordScore = 0;

for (const intent of intents) {
  for (const pattern of intent.patterns) {
    const patternWords = pattern.toLowerCase().split(/\s+/).filter(w => w.length > 3);
    if (patternWords.length === 0) continue;
    const matches = userWords.filter(w => patternWords.includes(w)).length;
    const score = matches / Math.max(patternWords.length, userWords.length, 1);
    if (score > bestWordScore) { bestWordScore = score; bestWordIntent = intent; }
  }
}

if (bestWordScore >= 0.4 && bestWordIntent) {
  return respondWithIntent(bestWordIntent, userInput);
}

// ---- PASS 5: Levenshtein similarity fallback ----
let bestIntent = null;
let bestScore = 0;
for (const intent of intents) {
  for (const pattern of intent.patterns) {
    const score = similarity(userInput, pattern);
    if (score > bestScore) { bestScore = score; bestIntent = intent; }
  }
}

if (bestScore > 0.5 && bestIntent) {
  return respondWithIntent(bestIntent, userInput);
}

return getFallbackMsg();
}

function typeMessage(element, text, onDone) {
let charIndex = 0;
let wordBuffer = '';
const speed = 30;

function typeNextCharacter() {
  if (charIndex < text.length) {
    const char = text[charIndex];
    wordBuffer += char;
    element.textContent = wordBuffer;
    
    const chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
    
    charIndex++;
    setTimeout(typeNextCharacter, speed);
  } else {
    if (typeof onDone === 'function') onDone();
  }
}

typeNextCharacter();
}

  tesla:'TSLA', meta:'META', facebook:'META', netflix:'NFLX', nvidia:'NVDA',

  visa:'V', mastercard:'MA', jpmorgan:'JPM', 'bank of america':'BAC', goldman:'GS',
  exxon:'XOM', shell:'SHEL', bp:'BP', boeing:'BA', ford:'F', gm:'GM',
  pfizer:'PFE', johnson:'JNJ', 'johnson & johnson':'JNJ', moderna:'MRNA',
  berkshire:'BRK-B', blackrock:'BLK', alibaba:'BABA', baidu:'BIDU', tencent:'TCEHY',
};
function extractStockQuery(msg) {
  const t = msg.toLowerCase();
  if (!/stock|share|price|ticker|market|trading|listed|equity/.test(t)) return null;
  for (const [name, ticker] of Object.entries(STOCK_TICKERS)) {
    if (t.includes(name)) return ticker;
  }
  const m = t.match(/\b([a-z]{1,5})\s+stock\b/);
  if (m) return m[1].toUpperCase();
  const m2 = t.match(/stock\s+(?:of|for|price of)?\s*([a-z]+)/);
  if (m2 && STOCK_TICKERS[m2[1]]) return STOCK_TICKERS[m2[1]];
  return null;
}
async function fetchStockPrice(symbol) {
  const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`,
  ];
  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl);
      let data = await res.json();
      if (data.contents) data = JSON.parse(data.contents);
      const meta = data.chart.result[0].meta;
      const price  = meta.regularMarketPrice;
      const prev   = meta.chartPreviousClose || meta.previousClose || price;
      const change = price - prev;
      const pct    = ((change / prev) * 100).toFixed(2);
      const arrow  = change >= 0 ? '▲' : '▼';
      const sign   = change >= 0 ? '+' : '';
      const name   = meta.longName || meta.shortName || symbol;
      const cur    = meta.currency || 'USD';
      const exch   = meta.exchangeName || '';
      return `📈 Stock Price — ${name}\n\n` +
             `Symbol: ${symbol}   Exchange: ${exch}\n` +
             `Price:  ${cur} ${price.toFixed(2)}\n` +
             `Change: ${arrow} ${sign}${change.toFixed(2)} (${sign}${pct}%)\n` +
             `Prev Close: ${cur} ${prev.toFixed(2)}\n\n` +
             `_Live data from Yahoo Finance_`;
    } catch(e) { continue; }
  }
  return `Sorry, I couldn't fetch the stock price for "${symbol}" right now. Please try again shortly.`;
}

}

  return null;

// ==================== CURRENCY CONVERTER ====================
function extractCurrencyQuery(msg) {
  const t = msg.toLowerCase().trim();
  const m = t.match(/(?:convert\s+)?(\d+(?:[.,]\d+)?)\s*([a-z]{3})\s+(?:to|in|into)\s+([a-z]{3})/);
  if (m) return { amount: parseFloat(m[1].replace(',','.')), from: m[2].toUpperCase(), to: m[3].toUpperCase() };
  const m2 = t.match(/(?:how much is\s+)?(\d+(?:[.,]\d+)?)\s*([a-z]{3})\s+(?:in|to|into)\s+([a-z]{3})/);
  if (m2) return { amount: parseFloat(m2[1].replace(',','.')), from: m2[2].toUpperCase(), to: m2[3].toUpperCase() };
  return null;
}
async function convertCurrency(amount, from, to) {
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await res.json();
    if (data.result === 'success' && data.rates && data.rates[to] !== undefined) {
      const rate = data.rates[to];
      const converted = (amount * rate).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const rateStr = rate < 0.01 ? rate.toExponential(4) : rate.toFixed(4);
      return `💱 Currency Conversion\n\n${amount.toLocaleString()} ${from}  =  ${converted} ${to}\n\nRate: 1 ${from} = ${rateStr} ${to}\nUpdated: live exchange rate`;
    }
    return `Sorry, I don't recognise the currency code "${to}". Please use standard 3-letter codes like USD, EUR, GBP, JPY, CAD, AUD, INR, CNY, CHF, SGD.`;
  } catch(e) {
    return `Sorry, I couldn't fetch the exchange rate right now. Please check your connection and try again.`;
  }
}

function _imgWrapText(ctx, text, x, y, maxWidth, lineHeight, align) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  const prev = ctx.textAlign;
  ctx.textAlign = align || 'left';
  for (let n = 0; n < words.length; n++) {
    const test = line + words[n] + ' ';
    if (ctx.measureText(test).width > maxWidth && n > 0) {
      ctx.fillText(line.trim(), x, cy);
      line = words[n] + ' ';
      cy += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, cy);
  ctx.textAlign = prev;
  return cy;
}

function _imgRoundRect(ctx, x, y, w, h, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha != null ? alpha : 1;
  ctx.fillStyle = color;
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
  ctx.fill();
  ctx.restore();
}

function _imgCircle(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha != null ? alpha : 1;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function _imgRect(ctx, x, y, w, h, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha != null ? alpha : 1;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

    label('🚀',396,210,'60px Arial','#FFFFFF','center');
    label('LAUNCH',390,390,'bold 14px Arial',P.accent,'center');

  } else {
    circ(W*0.15,H*0.2,140,P.accent,0.07); circ(W*0.85,H*0.8,180,P.tint,0.07); circ(W*0.5,H*0.5,260,P.accent,0.04);
    rect(0,0,8,H,P.accent,0.8); rect(0,H-4,W,4,P.tint,0.7);
    ctx.save(); ctx.globalAlpha=0.06; ctx.fillStyle=P.accent; ctx.font='bold 360px Arial'; ctx.textAlign='center';
    ctx.fillText((title[0]||'U').toUpperCase(),W/2,H*0.78); ctx.restore();
    drawStar(W-100,80,28,P.tint,0.7); drawStar(90,H-110,20,P.high,0.6);
  }

  drawTitleOverlay();
  return canvas.toDataURL('image/png');
}

function addImageToChat(topic, dataUrl) {
  const chat = document.getElementById('chat-box');
  const wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  wrapper.style.cssText = 'display:flex;flex-direction:column;gap:8px;max-width:90%;';

  const label = document.createElement('div');
  label.textContent = `Here's your visual for "${topic}":`;
  label.style.cssText = 'font-size:0.92em;color:#555;';

  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.cssText = 'width:100%;max-width:600px;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,0.18);';

  const btn = document.createElement('a');
  btn.href = dataUrl;
  btn.download = `usemee-${topic.replace(/\s+/g, '-').toLowerCase()}.png`;
  btn.textContent = '⬇ Download Image';
  btn.style.cssText = 'display:inline-block;padding:8px 20px;background:#007bff;color:#fff;border-radius:20px;font-size:0.88em;font-weight:600;text-decoration:none;width:fit-content;';

  wrapper.appendChild(label);
  wrapper.appendChild(img);
  wrapper.appendChild(btn);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

async function processQuestion(msg) {
  if (businessCreationFlow.active) {
    showTypingIndicator();
    await new Promise(r => setTimeout(r, 500));
    removeTypingIndicator();
    const reply = handleBusinessCreationStep(msg);
    addMessage(reply, 'bot');
    return;
  }

  const currencyQuery = extractCurrencyQuery(msg);
  if (currencyQuery) {
    showTypingIndicator();
    const reply = await convertCurrency(currencyQuery.amount, currencyQuery.from, currencyQuery.to);
    removeTypingIndicator();
    addMessage(reply, 'bot');
    return;
  }

  const stockSymbol = extractStockQuery(msg);
  if (stockSymbol) {
    showTypingIndicator();
    const stockText = await fetchStockPrice(stockSymbol);
    removeTypingIndicator();
    if (stockText.startsWith('Sorry')) {
      addMessage(stockText, 'bot');
    } else {
      displayStockCard(stockText);
    }
    return;
  }

  const countryKey = extractCountryQuery(msg);
  if (countryKey) {
    showTypingIndicator();
    await new Promise(r => setTimeout(r, 500));
    removeTypingIndicator();
    displayCountryCard(countryKey);
    return;
  }

  const imgTopic = extractImageTopic(msg);
  if (imgTopic) {
    showTypingIndicator();
    await new Promise(r => setTimeout(r, 400));
    removeTypingIndicator();
    addMessage(`Creating a visual image for "${imgTopic}"...`, 'bot');
    try {
      const dataUrl = generateImageForTopic(imgTopic);
      addImageToChat(imgTopic, dataUrl);
    } catch(e) {
      addMessage('Sorry, I could not generate the image. Please try again.', 'bot');
    }
    return;
  }

  const pptTopic = getPptRequestTopic(msg);
  if (pptTopic === 'needTopic') {
    showTypingIndicator();
    await new Promise(r => setTimeout(r, 500));
    removeTypingIndicator();
    addMessage('Please specify the topic for the presentation, for example: "Create a presentation about marketing strategy".', 'bot');
    return;
  }
  if (pptTopic) {
    showTypingIndicator();
    await new Promise(r => setTimeout(r, 600));
    removeTypingIndicator();
    addMessage(`✅ Generating your presentation about "${pptTopic}". Download should start shortly.`, 'bot');
    const success = await generatePptForTopic(pptTopic);
    if (!success) {
      addMessage('❌ Presentation failed to download. Please try again or check browser permissions.', 'bot');
    }
    return;
  }

  showTypingIndicator();
  await new Promise(r => setTimeout(r, 700));
  removeTypingIndicator();
  const reply = getBotReply(msg);
  addMessage(reply, 'bot');
}

async function sendMessage() {
  const userInputEl = document.getElementById('user-input');
  const message = userInputEl.value.trim();
  if (message === '') return;
  addMessage(message, 'user');
  userInputEl.value = '';

  const questions = message.split('?').map(q => q.trim()).filter(q => q.length > 1);
  if (questions.length > 1) {
    for (const q of questions) {
      await processQuestion(q + '?');
    }
  } else {
    await processQuestion(message);
  }
}

$("#user-input").on('keypress', function(e) {
  if (e.key === 'Enter') sendMessage();
});

$("#suggestBtn").click(() => $("#suggestBox").toggle());
$("#closeBtn").click(() => $("#suggestBox").hide());
$(".suggestion").click(function() {
$("#user-input").val($(this).text());
sendMessage();
$("#suggestBox").hide();
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
recognition = new SpeechRecognition();
recognition.lang = "en-US";
recognition.continuous = false;
recognition.interimResults = false;

recognition.onstart = () => {
const btn = document.getElementById("voice-btn");
if(btn) btn.classList.add("listening");
};

recognition.onend = () => {
const btn = document.getElementById("voice-btn");
if(btn) btn.classList.remove("listening");
};

recognition.onresult = function(event) {
const transcript = event.results[0][0].transcript;
document.getElementById("user-input").value = transcript;
sendMessage();
};
}

function startVoice() {
if(recognition) {
recognition.start();
} else {
alert("Speech recognition not supported");
}
}

};
