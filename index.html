voice-btn {
    border: none;
    background-color: #eee;
    padding: 10px 12px;
    margin-left: 8px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;

#voice-btn:hover {

#voice-btn.listening {

    50% { transform: scale(1.1); }
    100% { transform: scale(1); }

body.dark #voice-btn {

}

body.dark #voice-btn:hover {

// ================= LEVENSHTEIN =================
function levenshteinDistance(a, b){
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));

    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;

    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(
                matrix[i-1][j]+1,
                matrix[i][j-1]+1,
                matrix[i-1][j-1]+cost
            );
        }
    }
    return matrix[b.length][a.length];
}

function similarity(s1,s2){
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();

    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;

    if(longer.length===0) return 1.0;

    return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

async function fetchNews(keyword = "") {
    try {
        const query = keyword || "business";
        const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&language=en&pageSize=5&apiKey=${NEWSAPI_KEY}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.articles && data.articles.length > 0) {
            let newsText = `📰 Latest ${keyword ? keyword : "Business"} News:\n\n`;
            
            data.articles.slice(0, 5).forEach((article, index) => {
                newsText += `${index + 1}. **${article.title}**\n`;
                newsText += `   📅 ${new Date(article.publishedAt).toLocaleDateString()}\n`;
                newsText += `   🔗 Source: ${article.source.name}\n`;
                newsText += `   ${article.description ? article.description.substring(0, 100) + "..." : ""}\n\n`;
            });
            
            return newsText;
        } else {
            return `No news found for "${keyword}". Try a different search term.`;
        }
    } catch (error) {
        console.error("NewsAPI Error:", error);
        return "Sorry, I couldn't fetch news at the moment. Please try again later.";
    }
}

async function analyzeStockMovement(company, symbol) {
    try {
        // Fetch company news from Finnhub (free tier)
        const newsUrl = `https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=2026-04-01&to=2026-04-04&token=${FINNHUB_KEY}`;
        const newsResponse = await fetch(newsUrl);
        const newsData = await newsResponse.json();
        
        // Fetch latest business news about company
        const businessNewsUrl = `https://newsapi.org/v2/everything?q=${encodeURIComponent(company + " stock")}&sortBy=publishedAt&language=en&pageSize=3&apiKey=${NEWSAPI_KEY}`;
        const businessResponse = await fetch(businessNewsUrl);
        const businessData = await businessResponse.json();
        
        let analysis = `📊 **${company.toUpperCase()} Stock Analysis**\n\n`;
        
        // Check if we have recent news
        if (newsData && newsData.length > 0) {
            analysis += `📉 **Recent Developments:**\n\n`;
            newsData.slice(0, 3).forEach((item, idx) => {
                analysis += `${idx + 1}. ${item.headline}\n`;
                analysis += `   Source: ${item.source}\n`;
                analysis += `   ${item.summary ? item.summary.substring(0, 120) + "..." : ""}\n\n`;
            });
        }
        
        // Add business news analysis
        if (businessData.articles && businessData.articles.length > 0) {
            analysis += `\n💡 **Why It Moved:**\n\n`;
            const articles = businessData.articles.slice(0, 3);
            
            // Sentiment analysis based on keywords
            let positiveSignals = 0;
            let negativeSignals = 0;
            let headlines = "";
            
            articles.forEach((article, idx) => {
                const text = (article.title + " " + article.description).toLowerCase();
                
                // Positive keywords
                if (text.includes("surge") || text.includes("soar") || text.includes("rally") || 
                    text.includes("gain") || text.includes("profit") || text.includes("grow") ||
                    text.includes("beat") || text.includes("success") || text.includes("innovative")) {
                    positiveSignals++;
                }
                
                // Negative keywords
                if (text.includes("drop") || text.includes("fall") || text.includes("decline") || 
                    text.includes("loss") || text.includes("fail") || text.includes("crash") ||
                    text.includes("risk") || text.includes("lawsuit") || text.includes("concern")) {
                    negativeSignals++;
                }
                
                headlines += `${idx + 1}. ${article.title}\n`;
            });
            
            analysis += headlines + "\n";
            
            if (negativeSignals > positiveSignals) {
                analysis += `⚠️ **Market Sentiment:** Negative\n`;
                analysis += `The recent headlines suggest negative sentiment with concerns or disappointing news affecting the stock price.\n`;
            } else if (positiveSignals > negativeSignals) {
                analysis += `✅ **Market Sentiment:** Positive\n`;
                analysis += `Recent developments show positive momentum with growth or success stories supporting the stock.\n`;
            } else {
                analysis += `➡️ **Market Sentiment:** Mixed\n`;
                analysis += `Recent news shows mixed signals with both positive and negative developments.\n`;
            }
        } else {
            analysis += `\nNo specific news found, but price movements can be influenced by overall market conditions, earnings reports, or analyst ratings.\n`;
        }
        
        return analysis;
    } catch (error) {
        console.error("Stock Analysis Error:", error);
        return `Unable to fetch detailed analysis for ${company}. The service may be temporarily unavailable.`;
    }
}

function typeText(div,text,speed=20){
    if(!text) text = "Error";

    div.textContent="";
    let i=0;

    const interval=setInterval(()=>{
        if(i < text.length){
            div.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(interval);
        }
    },speed);
}

function addMessage(text,sender,id=null){
    const chatBox=document.getElementById('chat-box');
    const msgDiv=document.createElement('div');

    msgDiv.classList.add('message',sender);
    if(id) msgDiv.id=id;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop=chatBox.scrollHeight;

    typeText(msgDiv,text,20);
}

function sendMessage() {
    const input = $("#user-input").val().trim();
    if (!input) return;

    addMessage(input, 'user');
    $("#user-input").val("");

    const loadingId = "msg-" + Date.now();
    addMessage("Thinking...", 'bot', loadingId);

    setTimeout(async () => {
        // --- MULTI-QUESTION LOGIC START ---
        // Split by "and", ".", or "?"
        const questions = input.toLowerCase().split(/and|[\.\?]/g).filter(q => q.trim().length > 2);
        
        let finalReply = "";
        
        if (questions.length > 1) {
            // Process each question and join them with a clear break
            const replies = questions.map(q => getBotReply(q.trim()));
            finalReply = replies.join("\n\n---\n\n"); 
        } else {
            // Just a single question
            finalReply = getBotReply(input);
        }
        
        // Check if the response is a stock analysis request
        if (typeof finalReply === 'object' && finalReply.isStockAnalysis) {
            finalReply = await analyzeStockMovement(finalReply.company, finalReply.symbol);
        }
        // Check if the response is a news request
        else if (typeof finalReply === 'object' && finalReply.isNews) {
            finalReply = await fetchNews(finalReply.keyword);
        }
        
        // --- MULTI-QUESTION LOGIC END ---

        const msgDiv = document.getElementById(loadingId);
        msgDiv.innerHTML = ""; // Clear the "Thinking..." text
        typeText(msgDiv, finalReply, 20);
        
        // If you have the voice function from before:
        if (typeof speakResponse === "function") {
            speakResponse(finalReply.replace(/-/g, "")); 
        }
    }, 500 + Math.random() * 800);
}
