body.dark .nav-buttons { background-color: #0f3460; border-bottom: 1px solid #1a1a2e; }
.nav-buttons button { background-color: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }

.chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; border-bottom: 1px solid #eee; }
body.dark .chat-box { border-bottom: 1px solid #0f3460; }

#suggestBtn { background-color: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 5px; }
#suggestBtn:hover { background-color: #0056b3; }

.chat-input-area .send-btn:hover { background-color: #218838; }
.message.loading { font-style: italic; opacity: 0.7; }
#voice-btn {
    border: none;
    background-color: #eee;
    padding: 10px 12px;
    margin-left: 8px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}
#voice-btn:hover { background-color: #ddd; }
#voice-btn.listening {
    background-color: #ff4d4d;
    color: white;

    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }

body.dark #voice-btn {

// ================= SWOT ANALYSIS =================
function handleSWOTFlow(input) {
    if (swotStep === 1) {
        swotData.business = input;
        swotStep = 2;
        return `Great! Now let's analyze ${input}.\n\nEnter your first STRENGTH:`;
    }

    if (swotStep === 2) {
        swotData.currentType = "strengths";
        swotData.tempItem = { description: input, score: 0 };
        swotStep = 3;
        return "Rate its importance (1-5):";
    }

    if (swotStep === 3) {
        const score = parseInt(input);
        if (score < 1 || score > 5) return "Please enter a number between 1-5";
        
        swotData.tempItem.score = score;
        swotData[swotData.currentType].push(swotData.tempItem);
        swotStep = 5;
        return `✅ Added!\n\nType "add" to add another ${swotData.currentType}, or "next" to continue:`;
    }

    if (swotStep === 5) {
        if (input.toLowerCase() === "add") {
            swotStep = 2;
            return `Enter another ${swotData.currentType}:`;
        }

        if (input.toLowerCase() === "next") {
            if (swotData.currentType === "strengths") {
                swotData.currentType = "weaknesses";
            } else if (swotData.currentType === "weaknesses") {
                swotData.currentType = "opportunities";
            } else if (swotData.currentType === "opportunities") {
                swotData.currentType = "threats";
            } else {
                return generateSWOTReport();
            }

            swotStep = 2;
            return `Now enter your first ${swotData.currentType}:`;
        }

        return "Type 'add' or 'next':";
    }
}

function generateSWOTReport() {
    swotMode = false;
    swotStep = 0;

    const top3 = (arr) => arr.sort((a, b) => b.score - a.score).slice(0, 3);

    const S = top3(swotData.strengths);
    const W = top3(swotData.weaknesses);
    const O = top3(swotData.opportunities);
    const T = top3(swotData.threats);

    const reportHTML = `
        <div class="report-container">
            <div class="report-header">📊 SWOT Analysis: ${swotData.business}</div>
            
            <div class="report-section">
                <b>🟢 Top Strengths (${S.length})</b><br>
                ${S.map((x, i) => `${i+1}. ${x.description} (Score: ${x.score}/5)`).join('<br>')}
            </div>

            <div class="report-section">
                <b>🔴 Key Weaknesses (${W.length})</b><br>
                ${W.map((x, i) => `${i+1}. ${x.description} (Score: ${x.score}/5)`).join('<br>')}
            </div>

            <div class="report-section">
                <b>🔵 Opportunities (${O.length})</b><br>
                ${O.map((x, i) => `${i+1}. ${x.description} (Score: ${x.score}/5)`).join('<br>')}
            </div>

            <div class="report-section">
                <b>🟠 Threats (${T.length})</b><br>
                ${T.map((x, i) => `${i+1}. ${x.description} (Score: ${x.score}/5)`).join('<br>')}
            </div>

            <div class="report-section">
                <b>🚀 Strategic Recommendations</b><br>
                • Use strengths to capitalize on opportunities<br>
                • Address weaknesses to mitigate threats<br>
                • Consider partnerships to overcome weaknesses<br>
                • Monitor competitive landscape for threats
            </div>

            <button onclick="downloadReport('swot')" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px;">
                📥 Download Report
            </button>
        </div>
    `;

    const chatBox = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', 'bot');
    msgDiv.innerHTML = reportHTML;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    return "✅ SWOT Analysis complete! Scroll up to see your report.";
}

function generateRecommendations(profit, revenue, expenses) {
    const recommendations = [];
    
    if (profit < 0) {
        recommendations.push("• Reduce operating expenses");
        recommendations.push("• Focus on revenue growth");
    }
    if (expenses > revenue * 0.8) {
        recommendations.push("• Optimize cost structure");
    }
    if (revenue > 0) {
        recommendations.push("• Scale marketing efforts");
        recommendations.push("• Expand product/service offerings");
    }
    recommendations.push("• Build customer loyalty programs");
    
    return recommendations.slice(0, 4).join('<br>');

// ================= LEVENSHTEIN DISTANCE =================
function levenshteinDistance(a, b) {
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));
    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;
    for(let i=1;i<=b.length;i++) {
        for(let j=1;j<=a.length;j++) {
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(
                matrix[i-1][j]+1,
                matrix[i][j-1]+1,
                matrix[i-1][j-1]+cost
            );
        }
    }
    return matrix[b.length][a.length];
}

function similarity(s1,s2) {
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();
    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;
    if(longer.length===0) return 1.0;
    return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

// ================= BOT REPLY LOGIC =================
function getBotReply(input) {
    if (swotMode) {
        return handleSWOTFlow(input);
    }

    let userInput = input.toLowerCase();

    // Check for chart requests
    if (userInput.includes("chart") || userInput.includes("graph") || userInput.includes("profit")) {
        return startChartReport();
    }

    // Check for report requests
    if (userInput.includes("report") || userInput.includes("analysis")) {
        return showReports();
    }

    // Check for swot requests
    if (userInput.includes("swot")) {
        swotMode = true;
        swotStep = 1;
        swotData = { business: "", strengths: [], weaknesses: [], opportunities: [], threats: [] };
        return "Let's create a SWOT Analysis! 📊\n\nWhat is your business name?";
    }

    // Intent matching
    let bestIntent = null;
    let bestScore = 0;

    for (const intent of intents) {
        for (const pattern of intent.patterns) {
            const score = similarity(userInput, pattern);
            if (score > bestScore) {
                bestScore = score;
                bestIntent = intent;
            }
        }
    }

    if (bestScore > 0.55 && bestIntent) {
        const response = bestIntent.responses[0];
        if (typeof response === 'object' && response.isReport) {
            showReports();
            return;
        }
        if (typeof response === 'object' && response.isSwot) {
            startSWOTReport();
            return;
        }
        if (typeof response === 'object' && response.isChart) {
            startChartReport();
            return;
        }
        return response;
    }

    return "I'm here to help with business insights! Try asking about SWOT analysis, business reports, or creating charts. 📊";
}

// ================= UI FUNCTIONS =================
function typeText(div, text, speed = 20) {
    if (!text) text = "Error";
    div.textContent = "";
    let i = 0;
    const interval = setInterval(() => {
        if (i < text.length) {
            div.textContent += text.charAt(i);
            i++;
        } else {
            clearInterval(interval);
        }
    }, speed);
}

function addMessage(text, sender, id = null) {
    const chatBox = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', sender);
    if (id) msgDiv.id = id;
    msgDiv.textContent = text;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function openPage(page) {
    window.location.href = page;
}

function sendMessage() {
    const input = $("#user-input").val().trim();
    if (!input) return;

    addMessage(input, 'user');
    $("#user-input").val("");

    const loadingId = "msg-" + Date.now();
    addMessage("Thinking...", 'bot', loadingId);

    setTimeout(() => {
        const reply = getBotReply(input);
        if (reply) {
            const msgDiv = document.getElementById(loadingId);
            msgDiv.textContent = reply;
        }
    }, 500 + Math.random() * 800);
}

$("#user-input").on('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        const btn = document.getElementById("voice-btn");
        if (btn) btn.classList.add("listening");
    };

    recognition.onend = () => {
        const btn = document.getElementById("voice-btn");
        if (btn) btn.classList.remove("listening");
    };

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("user-input").value = transcript;
        sendMessage();
    };

    recognition.onerror = function(e) {
        console.error("Voice error:", e.error);
        const btn = document.getElementById("voice-btn");
        if (btn) btn.classList.remove("listening");
    };
}

function startVoice() {
    if (recognition) {
        recognition.start();
    } else {

    }
}
