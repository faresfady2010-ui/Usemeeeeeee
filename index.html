.chat-input-area .send-btn:hover { background-color: #218838; }
.message.loading { font-style: italic; opacity: 0.7; }
#voice-btn { border: none; background-color: #eee; padding: 10px 12px; margin-left: 8px; border-radius: 50%; cursor: pointer; font-size: 16px; transition: 0.2s; }

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
body.dark #voice-btn { background-color: #0f3460; color: #e0e0e0; }
body.dark #voice-btn:hover { background-color: #1a1a2e; }

<body>
<div class="chat-container">
    <div class="chat-header">usemee</div>
    <div class="nav-buttons">

        <button onclick="openPage('templates/about.html')">About</button>

    <div class="chat-box" id="chat-box"></div>

let lastTopic = "";

function levenshteinDistance(a, b){
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));
    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;
    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(matrix[i-1][j]+1, matrix[i][j-1]+1, matrix[i-1][j-1]+cost);
        }
    }
    return matrix[b.length][a.length];
}

function similarity(s1,s2){
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();
    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;
    if(longer.length===0) return 1.0;
    return (longer.length - levenshteinDistance(longer, shorter)) / longer.length;
}

const GNEWS_API_KEY = "0d31cf6bde31c6920f82e4763c62d0ca";

function fetchNews(keyword = "") {
    const query = encodeURIComponent(keyword || "business");
    const url = `https://gnews.io/api/v4/search?q=${query}&lang=en&max=10&token=${GNEWS_API_KEY}`;
    return fetch(url).then(r=>r.json()).then(data=>{
        if(data.articles && data.articles.length>0){
            let txt = `📰 **${keyword} News:**\n\n`;
            data.articles.slice(0,5).forEach((a,i)=>{txt += `${i+1}. ${a.title}\n🔗 ${a.source.name}\n${a.description? a.description.substring(0,80)+"...":""}\n\n`});
            return txt;
        }
        return `No news for "${keyword}".`;
    }).catch(e=>"📰 News unavailable");
}

function analyzeStockMovement(company, symbol) {
    const url = `https://api.twelvedata.com/quote?symbol=${symbol}&apikey=demo`;
    return fetch(url).then(r=>r.json()).then(data=>{
        let analysis = `📊 **${symbol} - ${company.toUpperCase()}**\n\n`;
        if(data.price){
            const change = data.price - data.previous_close;
            const pct = ((change/data.previous_close)*100).toFixed(2);
            analysis += `💰 **Real-time:**\nCurrent: $${parseFloat(data.price).toFixed(2)}\nChange: ${change.toFixed(2)} (${pct}%)\n${change>0?'📈 UP':'📉 DOWN'}\n📍 Twelve Data`;
        }else{
            const s = stockData[symbol];
            if(s){
                const c = s.price - s.prevClose;
                const p = ((c/s.prevClose)*100).toFixed(2);
                analysis += `💰 **Demo Data:**\nCurrent: $${s.price}\nChange: ${c.toFixed(2)} (${p}%)\n⚠️ Fallback`;
            }else{analysis += `Not available`;}
        }
        return analysis;
    }).catch(e=>{
        const s = stockData[symbol];
        if(s){
            const c = s.price - s.prevClose;
            const p = ((c/s.prevClose)*100).toFixed(2);
            return `📊 **${symbol}**\n💰 $${s.price}\n📈 ${c>0?'UP':'DOWN'} (${p}%)`;
        }
        return `Stock data unavailable`;
    });
}

function resolveContext(text){
    if((text.includes("it")||text.includes("this")||text.includes("that"))&&lastTopic) return lastTopic;
    return text;
}

function getBotReply(input){
    try{
        let userInput = input.toLowerCase();
        const stockKeywords = ["stock","price","drop","fall","rise","surge","crash","share","market","why","rate","value","gain","loss","down","up","trend","perform","bull","bear","ipo"];
        const companySymbols = {"tesla":"TSLA","apple":"AAPL","google":"GOOGL","amazon":"AMZN","microsoft":"MSFT","facebook":"FB","meta":"META","netflix":"NFLX","nvidia":"NVDA","intel":"INTC","amd":"AMD","bmw":"BMW","samsung":"SSNLF","toyota":"TM","uber":"UBER","airbnb":"ABNB","zoom":"ZM","twitter":"X"};
        const hasStock = stockKeywords.some(kw=>userInput.includes(kw));
        const company = Object.keys(companySymbols).find(c=>userInput.includes(c));
        if(hasStock && company) return {isStockAnalysis:true, company:company, symbol:companySymbols[company]};
        if(userInput.includes("news")||userInput.includes("latest")) return {isNews:true, keyword:"business"};
        
        let bestIntent = null, bestScore = 0;
        for(const intent of intents){
            for(const pattern of intent.patterns){
                const score = similarity(userInput, pattern);
                if(score > bestScore){bestScore = score; bestIntent = intent;}
            }
        }
        if(bestScore > 0.55 && bestIntent) return bestIntent.responses[Math.floor(Math.random()*bestIntent.responses.length)];
        return "Try asking about business, finance, stocks, or entrepreneurship!";
    }catch(e){console.error(e); return "Something went wrong ⚠️";}
}

function typeText(div,text,speed=20){
    if(!text) text = "Error";
    div.textContent="";
    let i=0;
    const interval=setInterval(()=>{if(i<text.length){div.textContent+=text.charAt(i);i++;}else{clearInterval(interval);}},speed);
}

function addMessage(text,sender,id=null){
    const chatBox=document.getElementById('chat-box');
    const msgDiv=document.createElement('div');
    msgDiv.classList.add('message',sender);
    if(id) msgDiv.id=id;
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop=chatBox.scrollHeight;
    typeText(msgDiv,text,20);
}

function openPage(page){console.log("Navigating to:",page);window.location.href=page;}

function sendMessage(){
    const input=$("#user-input").val().trim();
    if(!input) return;
    addMessage(input,'user');
    $("#user-input").val("");
    const loadingId="msg-"+Date.now();
    addMessage("Thinking...",'bot',loadingId);
    setTimeout(()=>{
        let finalReply=getBotReply(input);
        if(typeof finalReply==='object'&&finalReply.isStockAnalysis){
            analyzeStockMovement(finalReply.company,finalReply.symbol).then(result=>{
                const msgDiv=document.getElementById(loadingId);
                msgDiv.innerHTML="";
                typeText(msgDiv,result,20);
            });
            return;
        }
        if(typeof finalReply==='object'&&finalReply.isNews){
            fetchNews(finalReply.keyword).then(result=>{
                const msgDiv=document.getElementById(loadingId);
                msgDiv.innerHTML="";
                typeText(msgDiv,result,20);
            });
            return;
        }
        const msgDiv=document.getElementById(loadingId);
        msgDiv.innerHTML="";
        typeText(msgDiv,finalReply,20);
    },500+Math.random()*800);
}

$("#user-input").on('keypress',function(e){if(e.key==='Enter') sendMessage();});
$("#suggestBtn").click(()=>$("#suggestBox").toggle());
$("#closeBtn").click(()=>$("#suggestBox").hide());
$(".suggestion").click(function(){$("#user-input").val($(this).text());sendMessage();$("#suggestBox").hide();});
if(localStorage.getItem('darkMode')==='enabled') document.body.classList.add('dark');
window.onload=()=>{addMessage("Hello! Ask me about business, finance, or stocks 🚀",'bot',null,true);}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition;
if(SpeechRecognition){
    recognition=new SpeechRecognition();
    recognition.lang="en-US";
    recognition.continuous=false;
    recognition.interimResults=false;
    recognition.onstart=()=>{const btn=document.getElementById("voice-btn");if(btn)btn.classList.add("listening");};
    recognition.onend=()=>{const btn=document.getElementById("voice-btn");if(btn)btn.classList.remove("listening");};
    recognition.onresult=function(event){document.getElementById("user-input").value=event.results[0][0].transcript;sendMessage();};
    recognition.onerror=function(e){console.error(e.error);document.getElementById("voice-btn").classList.remove("listening");};
}
function startVoice(){if(recognition){recognition.start();}else{alert("Speech recognition not supported");}}
</script>
