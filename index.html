{tag:"role_software_engineer",patterns:["what does a software engineer do?","what is the role of a software developer in a business?","what does a developer do?"],responses:["A Software Engineer designs, builds, tests, and maintains software systems. In a business context, they build the products customers use, the internal tools teams rely on, and the infrastructure that keeps everything running. 💻","Software Engineer types: Frontend (user interfaces), Backend (server logic and databases), Full-stack (both), DevOps/SRE (infrastructure and deployment), and Mobile (iOS/Android). Each is a distinct skill set — few people truly master all of them. 🖥️"]},
{tag:"role_data_analyst",patterns:["what does a data analyst do?","what is the role of a data analyst in business?","what does business data analysis involve?"],responses:["A Data Analyst collects, cleans, analyses, and visualises data to help businesses make better decisions. They answer questions like: 'Which marketing channel has the best ROI?' or 'Which customer segment churns most?' 📊","Data Analyst tools: SQL (querying databases), Python or R (statistical analysis), Tableau/Power BI (visualisation), Excel (everywhere). The most valuable skill isn't technical — it's asking the right business questions before running any analysis. 🔍"]},
{tag:"role_data_scientist",patterns:["what does a data scientist do?","data scientist vs data analyst difference?","what is the role of a data scientist?"],responses:["A Data Scientist builds predictive models and machine learning systems — they go beyond describing what happened (analytics) to predicting what will happen and recommending actions. They use statistics, programming, and domain expertise. 🤖","Data Scientist vs Data Analyst: Analysts describe past data; Scientists predict future outcomes. Scientists build ML models; Analysts build dashboards. Scientists need strong statistics and programming; Analysts need strong SQL and visualisation. Both are essential. 📈"]},
{tag:"role_cybersecurity",patterns:["what does a cybersecurity manager do?","what is the role of a ciso?","what does information security involve in business?"],responses:["A CISO (Chief Information Security Officer) protects the company's digital assets from threats — managing cybersecurity strategy, incident response, compliance (GDPR, SOC2), security training, and risk assessment. In 2025, this is a critical role in every business. 🔐","Cybersecurity responsibilities: threat monitoring, vulnerability assessment, security policy development, employee training (phishing awareness), incident response planning, and vendor security reviews. The average cost of a data breach is $4.45M — security investment pays for itself. ⚠️"]},
{tag:"role_devops",patterns:["what does a devops engineer do?","what is the role of devops in a company?","what does devops mean?"],responses:["DevOps engineers bridge development and operations — they build and maintain the infrastructure that lets developers ship code fast and safely. CI/CD pipelines, cloud infrastructure, monitoring, and deployment automation are their domain. ⚙️","DevOps is both a role and a culture — breaking down silos between dev teams (who write code) and ops teams (who run infrastructure). Companies with strong DevOps ship software faster, more reliably, and with fewer incidents. 🚀"]},
{tag:"role_ux_designer",patterns:["what does a ux designer do?","what is the role of a ux designer in business?","what does user experience design involve?"],responses:["A UX Designer researches how users interact with a product and designs experiences that are intuitive, useful, and delightful. They conduct user research, create wireframes and prototypes, and test designs before development begins. 🎨","UX vs UI: UX is how it feels (user research, flow, usability); UI is how it looks (visual design, colours, typography). Most modern 'UI/UX designers' do both. Great UX saves huge amounts in development rework — fix it in wireframe, not in code. 💡"]},
{tag:"role_system_architect",patterns:["what does a solutions architect do?","what is the role of a system architect?","what does enterprise architecture involve?"],responses:["A Solutions Architect designs the high-level structure of software systems — selecting technologies, defining integration patterns, and ensuring the architecture can support business requirements now and in the future. 🏗️","Systems architects make decisions that affect the entire engineering organisation. A bad architecture decision made today can cost millions to undo in 3 years. Great architects balance technical elegance with business pragmatism. 💡"]},

// ============================================================
// BLOCK 7: LEGAL & COMPLIANCE ROLES
// ============================================================
{tag:"role_lawyer_business",patterns:["what does a business lawyer do?","what is the role of a corporate lawyer?","when does a business need a lawyer?"],responses:["A Corporate Lawyer advises businesses on legal matters — contracts, employment law, intellectual property, regulatory compliance, mergers, and dispute resolution. Every growing business needs legal counsel before they think they need it. ⚖️","Hire a business lawyer for: incorporation, shareholder agreements, major contracts, employment disputes, IP protection, fundraising, and M&A. The cost of a good lawyer is always less than the cost of a legal problem that could have been prevented. 📜"]},
{tag:"role_compliance_officer",patterns:["what does a compliance officer do?","what is the role of a compliance manager?","what does regulatory compliance involve?"],responses:["A Compliance Officer ensures the company follows all relevant laws, regulations, and internal policies. In regulated industries (finance, healthcare, pharma), this is a critical role — violations can result in massive fines or loss of operating licences. 📋","Compliance responsibilities: regulatory monitoring (staying current on laws), policy development, compliance training, audit management, reporting to regulators, and investigating breaches. Non-compliance is rarely an accident — it's usually a culture problem. ⚠️"]},
{tag:"role_legal_counsel",patterns:["what does in-house legal counsel do?","what is the role of general counsel?","in-house lawyer vs outside lawyer difference?"],responses:["In-house counsel (General Counsel or Legal Counsel) is a lawyer employed directly by the company — advising across all legal matters as a business partner, not just a service provider. They understand the business deeply and provide faster, more contextualised advice. ⚖️","In-house vs outside counsel: in-house lawyers give ongoing strategic advice at lower per-hour cost; outside law firms bring specialist expertise for complex matters (M&A, litigation). Most companies use both — in-house for daily needs, firms for big transactions. 📜"]},
{tag:"role_contract_manager",patterns:["what does a contract manager do?","what is the role of contract management?","how are business contracts managed?"],responses:["A Contract Manager oversees the full contract lifecycle — drafting, negotiating, executing, monitoring, and renewing contracts with customers, suppliers, and partners. Poor contract management costs companies billions annually in missed obligations and disputes. 📋","Contract Management responsibilities: contract templates and playbooks, negotiation support, obligation tracking, renewal management, and contract database maintenance. Technology (CLM software) is transforming this function from manual to automated. 🔄"]},

// ============================================================
// BLOCK 8: FAMOUS BUSINESSPEOPLE
// ============================================================
{tag:"elon_musk",patterns:["who is elon musk?","what businesses does elon musk own?","what can i learn from elon musk?"],responses:["Elon Musk is the founder/CEO of Tesla (electric vehicles), SpaceX (rockets and satellites), and X/Twitter (social media). He also co-founded PayPal and Neuralink. He's the richest person in history at his peak and is known for his extreme risk tolerance and 'first principles' thinking. 🚀","Elon Musk business lessons: think from first principles (question every assumption), set seemingly impossible goals (moonshots attract extraordinary people), move faster than anyone thinks is reasonable, and build vertically integrated companies. His companies succeed by owning their entire value chain. 💡"]},
{tag:"jeff_bezos",patterns:["who is jeff bezos?","what did jeff bezos build?","what can i learn from jeff bezos?"],responses:["Jeff Bezos founded Amazon in 1994 in a garage — starting as an online bookstore and building it into the world's largest retailer and cloud computing provider (AWS). He stepped down as CEO in 2021 and also founded Blue Origin (space travel). 📦","Bezos business lessons: customer obsession (everything flows from serving the customer), long-term thinking (ignore short-term profits for long-term dominance), 'Day 1 culture' (act like a startup even when you're massive), and the 'two-pizza rule' (small teams move faster). 🎯"]},
{tag:"warren_buffett",patterns:["who is warren buffett?","what is warren buffett's investment strategy?","what can i learn from warren buffett?"],responses:["Warren Buffett is the 'Oracle of Omaha' — one of the greatest investors in history. He runs Berkshire Hathaway, which owns stakes in Apple, Coca-Cola, American Express, and hundreds of other companies. His net worth exceeds $100 billion. 💰","Buffett's investment principles: buy wonderful businesses at fair prices (not fair businesses at wonderful prices), invest in what you understand, hold for decades not months, avoid debt, be greedy when others are fearful, and be fearful when others are greedy. Timeless wisdom. 📈"]},
{tag:"bill_gates",patterns:["who is bill gates?","what did bill gates build?","what can i learn from bill gates?"],responses:["Bill Gates co-founded Microsoft in 1975, building it into the world's largest software company. He was the world's richest person for decades. He stepped back from Microsoft to focus on philanthropy through the Bill & Melinda Gates Foundation. 💻","Gates business lessons: hire people smarter than yourself, read obsessively (60 books/year), think long-term about technology trends, and focus on solving the world's most important problems. He's also famously honest about his mistakes — a rare trait in business leaders. 📚"]},
{tag:"steve_jobs",patterns:["who is steve jobs?","what did steve jobs build?","what can i learn from steve jobs?"],responses:["Steve Jobs co-founded Apple, was ousted, came back, and built it into the most valuable company in the world. He's responsible for the Mac, iPod, iPhone, iPad, iTunes, and Pixar (which he purchased and grew). He changed multiple industries. 🍎","Jobs business lessons: simplicity is hard (it requires saying no to many good ideas), design is not just how things look but how they work, build products customers don't know they want yet, and surround yourself with A-players who challenge you. His perfectionism created world-changing products. 💡"]},
{tag:"oprah_winfrey_business",patterns:["how did oprah winfrey build her business empire?","what businesses does oprah own?","what can entrepreneurs learn from oprah?"],responses:["Oprah built a $2.5 billion empire from nothing — starting as a TV host and expanding into a media company (Harpo Productions), a magazine (O), a TV network (OWN), a wellness brand (Weight Watchers investment), and a film/TV production company. 🌟","Oprah's business lessons: authenticity is the ultimate brand — build around who you genuinely are; use your platform to create platforms for others; never underestimate the power of personal storytelling in business; and emotional connection beats advertising every time. 💡"]},
{tag:"richard_branson",patterns:["who is richard branson?","what businesses does richard branson own?","what can i learn from richard branson?"],responses:["Richard Branson founded Virgin Group, which spans 400+ companies — Virgin Atlantic, Virgin Records (sold), Virgin Galactic, Virgin Hotels, and more. He built an empire on contrarian bets, strong branding, and a reputation for customer experience. 🚀","Branson business lessons: protect the downside (Virgin's joint ventures mean he risks capital, not the whole company), build brand before products (Virgin entered many industries purely on brand strength), hire great managers and get out of their way, and have fun — it's contagious. 🌟"]},
{tag:"jack_ma",patterns:["who is jack ma?","what did jack ma build?","what can i learn from jack ma?"],responses:["Jack Ma founded Alibaba Group in 1999, building it from a small e-commerce site into one of the largest technology companies in the world — including Alibaba, Taobao, Tmall, Alipay, and Ant Financial. He was rejected from Harvard 10 times and KFC once. 🎯","Jack Ma lessons: never give up on rejection (he was rejected by almost every employer before founding Alibaba), stay customer-obsessed, build ecosystems not just products, and understand that your biggest competitor today might be your best partner tomorrow. 💡"]},
{tag:"mark_zuckerberg",patterns:["who is mark zuckerberg?","what did mark zuckerberg build?","what can i learn from mark zuckerberg?"],responses:["Mark Zuckerberg co-founded Facebook (now Meta) at 19 from his Harvard dorm room. Meta now owns Facebook, Instagram, WhatsApp, and Oculus. Despite many controversies, he's one of the most successful tech founders of his generation. 📱","Zuckerberg lessons: move fast (Facebook's early motto was 'Move fast and break things'), prioritise user growth over revenue early, build for social connection as a fundamental human need, and be willing to acquire competitors before they become threats (Instagram, WhatsApp). 🚀"]},
{tag:"larry_page_sergey_brin",patterns:["who founded google?","what did larry page and sergey brin build?","what can i learn from google's founders?"],responses:["Larry Page and Sergey Brin founded Google in 1998 as a PhD research project at Stanford. What started as a search algorithm became the world's most used search engine and eventually Alphabet Inc., the parent company of Google, YouTube, Waymo, and DeepMind. 🔍","Google founding lessons: start with a genuine technical problem worth solving, think 10x not 10% (moonshot culture), hire only the best and let them work on meaningful problems, and build infrastructure that others can build on top of. 💡"]},
{tag:"sam_walton",patterns:["who is sam walton?","what did sam walton build?","how did walmart start?"],responses:["Sam Walton founded Walmart in 1962 in Rogers, Arkansas. He built it by obsessing over costs (allowing lower prices), investing in logistics, and expanding relentlessly into underserved small towns. By his death in 1992, Walmart was the world's largest retailer. 🛒","Walton's business lessons: pass every saving on to the customer (not the investor), love your associates (employees), study competitors shamelessly, keep overhead lean, and move to where competition isn't — he built Walmart in small towns before going to cities. 💡"]},
{tag:"sara_blakely",patterns:["who is sara blakely?","how did sara blakely start spanx?","what can entrepreneurs learn from sara blakely?"],responses:["Sara Blakely founded Spanx in 2000 with $5,000 in savings, no business experience, and no outside investment. She grew it into a $1 billion brand before selling a majority stake to Blackstone in 2021. She was the youngest self-made female billionaire in the US. 👊","Sara Blakely lessons: you don't need experience — you need belief in your idea; manufacture cheaply and sell directly; protect your IP early (she patented Spanx herself); and redefine failure — her father asked her weekly what she'd 'failed at and learned from.' 💡"]},
{tag:"howard_schultz",patterns:["who is howard schultz?","how did howard schultz build starbucks?","what can i learn from howard schultz?"],responses:["Howard Schultz joined Starbucks as marketing director in 1982 and eventually bought the company. He transformed Starbucks from a Seattle coffee bean retailer into a global café empire with 35,000+ locations. He stepped in multiple times to rescue the brand when it drifted. ☕","Schultz lessons: create a 'third place' (not home, not work — a destination); treat employees well because they ARE the product; don't dilute your brand chasing short-term profits; and be willing to slow down to grow sustainably. His multiple comebacks show that reversals are survivable. 🌟"]},
{tag:"henry_ford",patterns:["who is henry ford?","what did henry ford invent in business?","what can i learn from henry ford?"],responses:["Henry Ford didn't invent the car — but he invented the mass-production assembly line and built Ford Motor Company into the most powerful industrial company of the early 20th century. His Model T made cars affordable for ordinary Americans. 🚗","Ford's business lessons: simplification multiplies production (the assembly line broke complex work into repeatable steps); pay workers enough to buy your products (he doubled wages to $5/day); vertical integration reduces dependence; and one great product executed perfectly beats many mediocre ones. 💡"]},
{tag:"andrew_carnegie",patterns:["who is andrew carnegie?","what did andrew carnegie build?","what can i learn from carnegie?"],responses:["Andrew Carnegie built the Carnegie Steel Company into the largest steel producer in the world, then sold it to J.P. Morgan in 1901 for $480 million (over $17 billion in today's money). He then gave away 90% of his wealth to libraries, universities, and peace institutions. 🏭","Carnegie's business lessons: dominate a single industry before diversifying; build vertically (own the raw materials); hire talent aggressively and pay for performance; and view wealth as a responsibility — his 'Gospel of Wealth' argued the rich have a moral duty to give back. 💡"]},

// ============================================================
// BLOCK 9: BUSINESS COMMUNICATION
// ============================================================
{tag:"how_to_write_email",patterns:["how do i write a professional email?","tips for writing business emails?","how do i write a good business email?"],responses:["Professional email structure: clear subject line (specific, not vague), one opening sentence with context, the main point up front (not buried), any required action bolded or bulleted, and a single clear call to action. Respect the reader's time. ✉️","Email writing tips: never bury the ask at the bottom, keep it under 5 sentences where possible, proofread before sending (especially names and figures), use 'Reply to all' sparingly, and don't send an angry email in the heat of the moment — draft it, sleep on it, revise it. 📧"]},
{tag:"how_to_run_meeting",patterns:["how do i run an effective meeting?","what makes a good business meeting?","how do i keep meetings productive?"],responses:["Effective meeting formula: send an agenda 24 hours before, start on time (always), have a clear objective ('by end of this meeting we will have decided X'), assign someone to take notes and actions, and end 5 minutes early for reflection. 📋","Most meetings should be emails. Before scheduling, ask: does this require real-time discussion? If yes, a meeting makes sense. If not, a well-written document is more efficient and creates a record. The best companies run fewer meetings — not more. ⏰"]},
{tag:"how_to_present",patterns:["how do i give a good presentation?","how do i present to executives?","tips for presenting in business?"],responses:["Great presentations: lead with the conclusion (don't make audiences wait), use no more than one idea per slide, speak to your audience's priorities (what matters to THEM), practise out loud not just in your head, and leave ample time for questions. 🎤","Presenting to executives: they have 10 minutes, not 60. Give them the recommendation first, then the supporting data. Never make them sit through 30 slides of analysis to reach the answer. Executives want decisions, not discoveries. 🎯"]},
{tag:"how_to_negotiate_salary",patterns:["how do i negotiate my salary?","what should i say when negotiating pay?","salary negotiation tips for employees?"],responses:["Salary negotiation: do your market research first (Glassdoor, LinkedIn Salary, industry surveys), let them make the first offer, counter 10-20% above your target, and give reasons based on value you bring — not personal need. Never apologise for negotiating. 💰","The single most powerful salary negotiation move: silence after making your counter. Let them respond without filling the awkward gap. People who are uncomfortable with silence give concessions unnecessarily. Practise being comfortable with quiet. 🤫"]},
{tag:"active_listening",patterns:["what is active listening in business?","how do i improve my listening skills?","why is listening important in business?"],responses:["Active listening means fully engaging with what someone is saying — not planning your reply while they talk. It involves maintaining eye contact, nodding, paraphrasing back ('So what I'm hearing is...'), and asking clarifying questions. 👂","Active listening is the most underrated business skill. Leaders who listen deeply make better decisions (more information), build stronger trust (people feel heard), and spot problems earlier. The fastest way to become a better communicator is to become a better listener. 🌟"]},
{tag:"how_to_give_feedback",patterns:["how do i give feedback to an employee?","how do i give constructive criticism?","what is the best way to give feedback at work?"],responses:["Effective feedback: specific (not 'your work is poor' but 'this report is missing the market size analysis'), timely (within 48 hours of the event), private (never criticise publicly), and focused on behaviour not character. End with confidence in their ability to improve. 💡","The feedback framework that works: Situation → Behaviour → Impact. 'In the client meeting (situation), you interrupted Sarah three times (behaviour) which made the client uncomfortable and damaged our relationship (impact).' Specific, factual, and non-personal. 📋"]},
{tag:"how_to_write_report",patterns:["how do i write a business report?","what should a business report include?","how do i write an executive summary?"],responses:["Business report structure: Executive Summary (conclusion first — 1 page), Situation/Background, Analysis/Findings, Recommendations, and Appendix. Write the executive summary last — it should stand alone. Decision-makers often only read the summary. 📊","Executive Summary tips: no more than one page, include the key decision/recommendation, the most important supporting facts, and the requested action. If the reader reads nothing else, they should have everything they need from the summary alone. 🎯"]},
{tag:"conflict_at_work",patterns:["how do i handle conflict at work?","how do i deal with a difficult colleague?","how do i resolve a workplace dispute?"],responses:["Workplace conflict resolution: address it early (it doesn't resolve itself), have the conversation privately, focus on the specific behaviour not the person, listen as much as you speak, and look for a mutually acceptable solution rather than trying to 'win'. ⚖️","When dealing with a difficult colleague: separate the personal from the professional (maybe they're struggling with something you don't see), try a private conversation before escalating, assume good intent until proven otherwise, and involve HR only when direct conversation has genuinely failed. 💡"]},
{tag:"communication_styles",patterns:["what are different communication styles in business?","how do i adapt my communication style?","why does communication style matter at work?"],responses:["Four business communication styles: Analytical (data-driven, detail-oriented — give them facts), Driver (results-focused, impatient — give them the bottom line first), Expressive (relationship-oriented — connect personally first), Amiable (consensus-seeking — involve them in decisions). 🎯","Adapting your communication style: identify what the other person values (speed, detail, relationships, collaboration) and mirror it. This isn't manipulation — it's respect. The most effective communicators flex their style to their audience, not the other way around. 🔄"]},
{tag:"public_speaking_tips",patterns:["how do i get better at public speaking?","how do i overcome fear of public speaking?","tips for presenting to a large audience?"],responses:["Getting better at public speaking: join Toastmasters (practice environment with feedback), record yourself (uncomfortable but revelatory), focus on your message not yourself, and know your opening 30 seconds cold so you can start strong even when nervous. 🎤","Fear of public speaking is normal — even great speakers feel it. The difference: they use the adrenaline as energy rather than letting it become paralysing. Preparation reduces anxiety. The more you know your material, the less you'll focus on what might go wrong. 💪"]},
{tag:"cross_cultural_communication",patterns:["how do i communicate across cultures in business?","what is cross-cultural communication?","how do i work with international teams?"],responses:["Cross-cultural communication: research the cultural norms of your counterpart (high-context vs low-context cultures, directness, hierarchy, relationship-building expectations), avoid idioms and jargon, check understanding often, and be patient with different communication styles. 🌍","High-context cultures (Japan, China, Middle East) communicate indirectly — meaning is implied; relationships matter enormously. Low-context cultures (US, Germany, Australia) prefer direct, explicit communication. Knowing the difference prevents massive misunderstandings in international business. 📊"]},

// ============================================================
// BLOCK 10: SALES TECHNIQUES
// ============================================================
{tag:"consultative_selling",patterns:["what is consultative selling?","how do i sell consultatively?","consultative selling vs traditional selling?"],responses:["Consultative selling: instead of pitching your product, you ask questions to diagnose the customer's problem, then present your solution as the right answer to THEIR specific situation. It builds trust and closes larger deals. 🤝","Consultative selling questions: 'What's your biggest challenge with X?', 'What happens if this problem isn't solved?', 'What does success look like for you?'. The rep who asks the best questions usually wins the deal — not the one with the best pitch. 💡"]},
{tag:"spin_selling",patterns:["what is spin selling?","how does spin selling work?","what are situation problem implication need questions?"],responses:["SPIN Selling (Neil Rackham): Situation questions (understand current state), Problem questions (uncover pain), Implication questions (make the cost of the problem vivid), Need-payoff questions (let the customer articulate the value of solving it). The customer sells themselves. 📊","SPIN example: Situation: 'How do you currently track your sales pipeline?' Problem: 'What happens when leads fall through the cracks?' Implication: 'What does each missed deal cost you?' Need-payoff: 'If you could eliminate that, what would that mean for your revenue?' 🎯"]},
{tag:"challenger_sale",patterns:["what is the challenger sale?","how does challenger selling work?","what is insight selling?"],responses:["The Challenger Sale (Dixon & Adamson): the most successful sales reps aren't the relationship-builders or the hard workers — they're the Challengers who teach customers something new, tailor their message, and take control of the sale. They reframe how customers think about their problems. 💡","Challenger reps lead with insight: 'Most companies in your industry are losing 15% of revenue to X without realising it. Here's what we've found...' They challenge the customer's assumptions rather than validating them, then connect the insight to their solution. 🎯"]},
{tag:"objection_handling",patterns:["how do i handle sales objections?","what are the most common sales objections?","how do i overcome the price objection?"],responses:["Objection handling framework: Acknowledge (don't argue), Clarify (is this the real objection?), Respond (address it directly), Confirm (did that resolve it?). Most objections are either a request for more information or a sign that value hasn't been established yet. 💼","The price objection ('It's too expensive'): don't discount immediately — this devalues your product and trains customers to always negotiate. Instead: 'Compared to what?' Then re-anchor on value. If budget is genuinely tight, adjust scope — not price. 💰"]},
{tag:"sales_closing",patterns:["how do i close a sale?","what are the best closing techniques?","how do i get a customer to say yes?"],responses:["Closing techniques: Assumptive close ('When shall we start?'), Alternative close ('Would you prefer monthly or annual billing?'), Summary close (restate all the value they agreed on, then ask for the order), Urgency close ('This offer expires Friday'). Use them naturally, not manipulatively. 🤝","The best close is the natural outcome of a great sales process. If you've properly qualified, built value, addressed objections, and created urgency — closing is just asking a question. If closing feels hard, usually the issue is earlier in the process. 🎯"]},
{tag:"prospecting",patterns:["how do i find new customers?","what is sales prospecting?","how do i generate leads?"],responses:["Prospecting methods: cold email (personalised, value-first), cold calling (still works in B2B with the right script), LinkedIn outreach, referral requests (most underused), content marketing (inbound leads), speaking at events, and partnerships. Diversify your pipeline sources. 📞","Lead generation framework: define your Ideal Customer Profile (ICP), find where they congregate (LinkedIn, industry events, specific subreddits, newsletters), show up there with genuine value, then offer a conversation. The best leads are warm ones — create content that makes them come to you. 🎯"]},
{tag:"sales_funnel",patterns:["what is a sales funnel?","how does a sales funnel work?","how do i build a sales funnel?"],responses:["Sales funnel stages: Awareness (prospect learns you exist), Interest (they engage with content/outreach), Consideration (they evaluate your solution), Intent (they request a demo or quote), Purchase (they buy), Retention (they renew and expand). 📊","Building a sales funnel: define the stages, identify the actions that move prospects between them, measure conversion at each stage, and focus improvement efforts on the stage with the worst conversion. A leaky funnel at any stage limits growth. 🎯"]},
{tag:"crm_sales",patterns:["how do i use a crm to improve sales?","what crm should i use?","how does crm improve sales performance?"],responses:["CRM for sales: log every interaction, update deal stages after every call, set follow-up reminders, and use pipeline reports to forecast revenue. A CRM is only as good as the data in it — 'if it's not in the CRM, it didn't happen' is the rule for high-performing teams. 📊","Best CRMs by use case: HubSpot (SMB, excellent free tier), Salesforce (enterprise, infinitely customisable), Pipedrive (sales-focused, simple), Close (built for phone-heavy sales), Zoho (affordable all-rounder). Start simple and add features as your process matures. 🛠️"]},
{tag:"upselling_crossselling",patterns:["what is upselling?","what is cross-selling?","how do i upsell customers?"],responses:["Upselling: encouraging a customer to buy a higher-value version of what they're already considering (economy to business class). Cross-selling: selling complementary products (phone + case + warranty). Both are more profitable than acquiring new customers. 💰","Upsell at the moment of peak satisfaction — just after a purchase, after a successful delivery, or when they've just expressed how happy they are. 'Since you're getting X, customers who also get Y typically see Z result.' Tie the upsell to their outcome. 🎯"]},
{tag:"social_selling",patterns:["what is social selling?","how do i sell on linkedin?","how do i use social media to get clients?"],responses:["Social selling: using social media (primarily LinkedIn) to build relationships with prospects by sharing valuable content, engaging with their posts, and reaching out personally — rather than cold outreach. It works because trust is built before the first sales call. 📱","LinkedIn social selling: optimise your profile (it's your landing page), post genuinely useful content 3x/week, comment meaningfully on prospects' posts, then message with personalised value — never a pitch in the first message. Build before you ask. 🤝"]},
{tag:"pipeline_management",patterns:["how do i manage my sales pipeline?","what is pipeline management?","how do i keep my pipeline healthy?"],responses:["Pipeline management: review every deal weekly (what's the next action? what's the risk?), keep deals moving (a deal with no activity in 14 days is likely dead), and be ruthless about disqualifying deals that have no realistic chance of closing. 📊","Healthy pipeline metrics: pipeline coverage ratio (you need 3-4x your quota in pipeline), average deal size, average sales cycle, and win rate by stage. If you know these numbers, you can predict revenue and identify exactly where the process breaks down. 🎯"]},

// ============================================================
// BLOCK 11: CUSTOMER SERVICE
// ============================================================
{tag:"good_customer_service",patterns:["what makes good customer service?","how do i improve customer service?","what do customers expect from service?"],responses:["Good customer service: fast response (customers hate waiting), empathy (acknowledge their frustration before solving it), ownership (take personal responsibility — never say 'that's not my department'), and follow-through (do exactly what you say you'll do). 💙","The bar for customer service has been set by Amazon, Apple, and Zappos — customers now expect fast, personalised, effortless experiences everywhere. Businesses that treat service as a cost centre lose; those that treat it as a growth function win. 🌟"]},
{tag:"handling_complaints",patterns:["how do i handle customer complaints?","what should i say to an angry customer?","how do i turn a complaint into a positive?"],responses:["Complaint handling formula: Listen (let them vent completely without interrupting), Acknowledge (validate their frustration), Apologise (even if it's not your fault — own the experience), Solve (offer a specific remedy), and Follow up (check they're satisfied). 💙","Research shows that a complaint handled brilliantly results in HIGHER loyalty than if the problem never occurred. Customers who've never had an issue often feel less connected than those who had a problem beautifully resolved. Service recovery is a relationship builder. 🌟"]},
{tag:"nps_score",patterns:["what is net promoter score?","how do i measure customer satisfaction?","what is a good nps score?"],responses:["NPS (Net Promoter Score): ask customers 'How likely are you to recommend us to a friend? (0-10)'. Promoters (9-10) minus Detractors (0-6) = your NPS. Above 50 is excellent. Apple is around 72, Amazon around 62. Track it quarterly. 📊","NPS benchmark by industry: Tech (35-45 average), Retail (30-45), Insurance (20-30), Banks (20-35). More important than the score is the trend — is it improving? And always follow up with 'why?' The qualitative feedback is where the gold is. 🎯"]},
{tag:"customer_service_channels",patterns:["what customer service channels should i use?","phone vs chat vs email support which is better?","how do i choose customer service channels?"],responses:["Customer service channels: Phone (best for complex/emotional issues), Live chat (best for quick technical queries, high volume), Email (best for non-urgent, documented responses), Self-service/FAQ (best for common questions — reduces volume dramatically). Use channel mix based on customer preference and issue complexity. 📞","Self-service is the highest ROI customer service investment. A great FAQ or knowledge base can deflect 30-50% of inbound queries. Invest in self-service first, then ensure human channels handle the complex issues that need real empathy. 💡"]},
{tag:"csat_score",patterns:["what is a csat score?","how do i measure customer satisfaction?","csat vs nps difference?"],responses:["CSAT (Customer Satisfaction Score): ask 'How satisfied were you with this interaction? (1-5)'. Measure immediately after transactions. Above 80% is good. Unlike NPS (loyalty), CSAT measures satisfaction with a specific interaction. 📊","CSAT vs NPS: CSAT measures transaction satisfaction (did we solve your problem today?); NPS measures overall relationship loyalty (would you recommend us?). Use both — CSAT for operational improvement, NPS for strategic brand health. 🎯"]},
{tag:"customer_success",patterns:["what is customer success?","how is customer success different from customer service?","how do i build a customer success team?"],responses:["Customer Success is proactive — helping customers achieve their goals with your product before they complain. Customer Service is reactive — solving problems after they occur. In SaaS, Customer Success is the key to retention, upsell, and referrals. 🌟","Customer Success team structure: CSMs (Customer Success Managers) own specific accounts, proactively check in, track product adoption, flag churn risk, and drive renewals and expansions. A great CS team makes customers so successful they become advocates. 💙"]},

// ============================================================
// BLOCK 12: ACCOUNTING & BOOKKEEPING
// ============================================================
{tag:"double_entry_bookkeeping",patterns:["what is double entry bookkeeping?","how does double entry accounting work?","why is double entry bookkeeping used?"],responses:["Double-entry bookkeeping: every transaction affects at least two accounts — a debit and a credit of equal amounts. Example: buying equipment for cash debits Equipment (asset up) and credits Cash (asset down). This creates the self-balancing system that catches errors. 📒","Double-entry is the foundation of all modern accounting. It was invented by Italian merchants in the 15th century (documented by Luca Pacioli) and hasn't changed fundamentally since. If it doesn't balance, something's wrong. 🔢"]},
{tag:"accounts_payable",patterns:["what is accounts payable?","how does accounts payable work?","what does an ap team do?"],responses:["Accounts Payable (AP) is money a business OWES to suppliers for goods or services received but not yet paid for. Managing AP well means paying on time (protecting supplier relationships), not early (preserving cash), and capturing early payment discounts when profitable. 💳","AP team responsibilities: invoice processing and approval, payment scheduling, supplier reconciliation, and expense reimbursement. AP automation (using OCR and workflow tools) is reducing manual processing time dramatically — a key area for operational efficiency. ⚙️"]},
{tag:"accounts_receivable",patterns:["what is accounts receivable?","how does accounts receivable work?","how do i improve accounts receivable collection?"],responses:["Accounts Receivable (AR) is money OWED TO the business by customers. Managing AR well means invoicing immediately, following up promptly on late payments, and having clear payment terms in every contract. Slow AR collection is a common cause of cash flow crises. 💵","AR improvement tips: invoice on delivery (not month-end), offer multiple payment methods, charge late payment fees (and enforce them), follow up after 14 days not 30, and offer early payment discounts for fast-paying customers. Cash in the bank beats a receivable every time. ⚡"]},
{tag:"depreciation",patterns:["what is depreciation in accounting?","how does depreciation work?","why do businesses depreciate assets?"],responses:["Depreciation spreads the cost of a long-term asset over its useful life. A $100,000 machine used for 10 years is depreciated at $10,000/year (straight-line). This matches the expense to the period the asset generates revenue — the matching principle. 📊","Depreciation types: Straight-line (equal annual charge), Declining balance (more depreciation in early years — reflects reality for tech), Units of production (charge based on usage). Depreciation is non-cash — it reduces profit but not cash flow, which is why EBITDA excludes it. 🔢"]},
{tag:"accrual_vs_cash",patterns:["what is the difference between accrual and cash accounting?","which accounting method should i use?","cash basis vs accrual basis accounting?"],responses:["Cash accounting: record revenue when cash is received, expenses when paid. Simple, reflects cash position. Accrual accounting: record revenue when earned, expenses when incurred — regardless of payment timing. Accrual gives a more accurate picture of performance. 📊","Most businesses above a certain size are required to use accrual accounting. Cash accounting is simpler but can be misleading — a business might look profitable (big invoice raised) but be cash-poor (not yet paid). Understand both to understand your business. 💡"]},
{tag:"chart_of_accounts",patterns:["what is a chart of accounts?","how do i set up a chart of accounts?","what does a business chart of accounts include?"],responses:["A Chart of Accounts (COA) is the complete list of financial accounts in a company's accounting system — organised by asset, liability, equity, revenue, and expense categories. Every transaction is coded to an account in the COA. 📋","COA structure: Assets (1000s), Liabilities (2000s), Equity (3000s), Revenue (4000s), Cost of Goods Sold (5000s), Operating Expenses (6000s). A well-designed COA makes financial reporting meaningful and management decisions data-driven. 🔢"]},
{tag:"trial_balance",patterns:["what is a trial balance?","how does a trial balance work?","what does a trial balance show?"],responses:["A Trial Balance lists all ledger accounts and their balances at a point in time. Total debits must equal total credits. It's used to verify the mathematical accuracy of the books before preparing financial statements. 📊","A trial balance doesn't prove the books are 100% correct — you could debit the wrong account and it still balances. But it catches arithmetic errors and is an essential step in the month-end close process. 🔢"]},
{tag:"reconciliation",patterns:["what is bank reconciliation?","how do i do a bank reconciliation?","why is reconciliation important in accounting?"],responses:["Bank reconciliation compares your internal cash records to the bank statement — explaining any differences (outstanding cheques, bank charges, timing differences). Done monthly, it catches errors and fraud early. 📒","Reconciliation principle: every balance sheet account should be reconciled regularly. Reconciling accounts payable, accounts receivable, payroll, and intercompany balances — not just bank — is a sign of a controlled finance function. 🔍"]},
{tag:"journals_ledgers",patterns:["what is a journal entry in accounting?","what is a general ledger?","how do journals and ledgers work?"],responses:["A Journal Entry is the record of a financial transaction — date, accounts affected, amounts, and description. Journal entries are then posted to the General Ledger (the master record of all accounts). The ledger is the source of all financial statements. 📒","Flow: Business event → Journal Entry → General Ledger → Trial Balance → Financial Statements. Understanding this flow demystifies accounting — it's the same process whether done manually in Excel or automatically in Xero/QuickBooks. 🔄"]},

// ============================================================
// BLOCK 13: BUSINESS BANKING & FINANCE
// ============================================================
{tag:"business_bank_account",patterns:["how do i open a business bank account?","what do i need for a business bank account?","which bank is best for small business?"],responses:["Opening a business bank account: you typically need your business registration documents, EIN/tax ID, owner's ID, and initial deposit. Separate business banking is non-negotiable — mixing personal and business finances is an accounting nightmare and can pierce LLC liability protection. 🏦","Best business banks for small businesses: Chase Business (large US network), Mercury (tech startups, no fees, excellent UX), Relay (multi-user, accounting integrations), Tide/Starling (UK SMBs). Online banks often have lower fees and better integrations with accounting software. 💡"]},
{tag:"business_loan_types",patterns:["what types of business loans are there?","how do i get a business loan?","what is the best business loan for a small business?"],responses:["Business loan types: Term loans (lump sum, fixed repayment schedule), Lines of credit (draw as needed, pay interest only on drawn amount), SBA loans (US government-backed, lower rates), Invoice financing (borrow against outstanding invoices), Equipment loans (buy equipment, asset is collateral). 🏦","Getting a business loan: lenders look at credit score (personal and business), revenue and profitability, time in business (usually 2+ years), and collateral. The best loan is usually the cheapest one you can qualify for — compare at least 3 lenders. 💰"]},
{tag:"line_of_credit",patterns:["what is a business line of credit?","how does a revolving credit line work?","when should i use a line of credit?"],responses:["A business line of credit is a pre-approved amount you can borrow, repay, and borrow again — like a business credit card but with lower rates and higher limits. Use it to bridge cash flow gaps, not for long-term capital needs. 💳","Line of credit tip: apply for one when you DON'T urgently need it (when your finances look strong). Banks lend to businesses that don't need the money — applying in a cash crisis gets you denied or charged punishing rates. Establish credit access before you need it. 🏦"]},
{tag:"merchant_cash_advance",patterns:["what is a merchant cash advance?","how does a merchant cash advance work?","is a merchant cash advance a good idea?"],responses:["A Merchant Cash Advance (MCA) advances you money against future credit card sales. The lender takes a percentage of daily card receipts until repaid. MCAs are fast to get but extremely expensive — effective APRs of 40-200% are common. ⚠️","MCAs are a last resort, not a growth tool. The repayment structure (daily percentage of revenue) can strangle cash flow. Explore all other options (bank loans, invoice financing, equity) before an MCA. If you must use one, use it once and exit fast. 💸"]},
{tag:"invoice_financing",patterns:["what is invoice financing?","how does invoice factoring work?","how do i get paid faster on invoices?"],responses:["Invoice financing (factoring): sell your outstanding invoices to a finance company at a discount (e.g., receive 90% immediately; the factor collects 100% from your customer and keeps 10%). Converts 60-day invoices into same-day cash. Solves cash flow without debt. 💵","Invoice financing vs bank loan: financing converts existing assets (invoices) to cash; loans add debt to the balance sheet. If your cash flow problems are caused by slow-paying customers, invoice financing is often the more natural solution. 📊"]},
{tag:"business_credit_score",patterns:["what is a business credit score?","how do i build business credit?","why does business credit matter?"],responses:["Business credit scores (Dun & Bradstreet PAYDEX, Experian Business, Equifax Business) range 0-100. Above 80 is excellent. They affect your ability to get loans, negotiate supplier terms, and qualify for business credit cards. Build it before you need it. 📊","Building business credit: open a business bank account, get a business credit card (and pay it in full monthly), register with D&B (get a DUNS number), pay suppliers on time, and file taxes. Business credit is separate from personal — protect both. 🏦"]},
{tag:"payment_terms",patterns:["what are standard payment terms?","what does net 30 mean?","how do i decide payment terms?"],responses:["Payment terms: Net 30 (payment due 30 days after invoice), Net 60, Net 90, 2/10 Net 30 (2% discount if paid within 10 days). Early payment discounts can be very expensive annualised — 2/10 Net 30 is equivalent to ~36% annual interest. Know the true cost. 📅","Payment term strategy: as a supplier, get paid as fast as possible (Net 15 or Net 30, not Net 60+). As a customer, extend terms as long as reasonable. The difference between your payment terms and your customers' payment terms drives your working capital need. 💡"]},

// ============================================================
// BLOCK 14: BUSINESS INSURANCE
// ============================================================
{tag:"business_insurance_types",patterns:["what types of business insurance do i need?","what insurance should a small business have?","what is general liability insurance?"],responses:["Essential business insurances: General Liability (covers injury/property damage claims), Professional Liability/E&O (covers advice errors), Property Insurance (your assets), Workers' Comp (employee injuries — required in most states), and Cyber Insurance (data breaches). Most small businesses need at least GL + Professional Liability. 🛡️","Don't underinsure to save premiums — the savings are tiny versus the catastrophic risk. A single liability claim or cyber breach can bankrupt an uninsured small business. Insurance is one of the best ROI purchases a business owner makes. ⚠️"]},
{tag:"professional_liability",patterns:["what is professional liability insurance?","what is errors and omissions insurance?","do i need professional liability coverage?"],responses:["Professional Liability (Errors & Omissions) covers you when a client claims your advice, service, or product caused them financial harm. Any professional who gives advice — consultants, accountants, lawyers, IT firms, architects — needs this. 🛡️","Without Professional Liability, a client lawsuit claiming your advice cost them money could bankrupt your business even if you did nothing wrong. Defence costs alone can exceed $50,000 before a verdict. This insurance covers both defence and damages. ⚖️"]},
{tag:"business_interruption_insurance",patterns:["what is business interruption insurance?","how does business interruption coverage work?","should i get business interruption insurance?"],responses:["Business Interruption Insurance replaces lost revenue if a covered event (fire, flood, major equipment failure) forces your business to close temporarily. It covers lost profits and ongoing fixed expenses (rent, payroll) during the recovery period. 🏢","COVID-19 revealed gaps in business interruption coverage — most policies excluded pandemic-related closures. Read your policy carefully and understand what triggers coverage. Natural disasters and physical property damage are the most common covered scenarios. 📋"]},
{tag:"cyber_insurance",patterns:["what is cyber insurance?","do i need cyber liability coverage?","how does cyber insurance work?"],responses:["Cyber Insurance covers costs of a data breach or cyberattack — notification to affected customers, credit monitoring, legal defence, regulatory fines, ransomware payments, and business interruption. The average data breach costs $4.45M. Cyber insurance is no longer optional. 🔐","Cyber insurance increasingly requires minimum security standards (MFA, endpoint protection, backups, staff training) before they'll insure you. This is actually positive — it forces better security practices. Budget $1,500-$10,000/year for SMB cyber coverage depending on revenue and risk. 💡"]},

// ============================================================
// BLOCK 15: BUSINESS LAW & CONTRACTS
// ============================================================
{tag:"what_is_contract",patterns:["what makes a contract legally binding?","what must a contract include?","what are the elements of a valid contract?"],responses:["A legally binding contract requires: Offer (one party proposes terms), Acceptance (other party agrees), Consideration (both sides give something of value), Capacity (both parties are legally able to contract), and Legality (the contract's purpose must be legal). Miss any one and the contract may be unenforceable. ⚖️","Contracts don't have to be written to be valid (verbal contracts are legally enforceable in most jurisdictions), but they absolutely should be. A written contract is evidence of what was agreed — oral agreements produce expensive 'he said, she said' disputes. 📜"]},
{tag:"nda_agreement",patterns:["when do i need an nda?","how does a non disclosure agreement work?","what should an nda include?"],responses:["Use an NDA when sharing confidential information — trade secrets, product plans, financial data, customer lists — with employees, contractors, investors, or potential partners. NDAs prevent recipients from disclosing or using that information. 🤐","NDA essentials: definition of confidential information (be specific), exclusions (public information isn't covered), duration (1-5 years is typical), permitted disclosures (legal requirements), and remedies (injunctive relief — courts will act fast). Have a lawyer review before signing anything significant. ⚖️"]},
{tag:"shareholder_agreement",patterns:["what is a shareholder agreement?","what should a shareholder agreement include?","why do i need a shareholder agreement?"],responses:["A Shareholder Agreement defines the rights and obligations of company shareholders — how decisions are made, how shares can be sold, what happens when a shareholder leaves or dies, dividend policy, and how disputes are resolved. It's essential for any company with multiple owners. 📜","Without a shareholder agreement, disputes between founders become court battles governed by default company law — often the worst outcome for everyone. Get one done at formation, not when the relationship is already under strain. Prevention is infinitely cheaper than litigation. ⚖️"]},
{tag:"employment_contract",patterns:["what should an employment contract include?","is an employment contract required?","what makes an employment contract valid?"],responses:["Employment contract essentials: job title and responsibilities, salary and benefits, working hours, start date, holiday entitlement, notice period, confidentiality obligations, IP ownership (any work created belongs to the company), and grounds for termination. 📋","In most jurisdictions, employees are entitled to a written statement of employment terms. Even where not legally required, a contract protects both parties — it prevents 'I never agreed to that' disputes and clearly outlines expectations from day one. ⚖️"]},
{tag:"terms_and_conditions",patterns:["what are terms and conditions?","do i need terms and conditions for my business?","what should terms and conditions include?"],responses:["Terms and Conditions (T&Cs) define the rules of engagement between your business and customers — payment terms, refund policy, liability limitations, intellectual property, and dispute resolution. Every business selling goods or services needs them. 📜","T&Cs protect your business: they set expectations upfront, limit your liability, establish your refund policy, and give you legal recourse in disputes. Use a lawyer to draft them (or a reputable template service) — copy-pasting a competitor's T&Cs is both ethically wrong and legally risky. ⚖️"]},
{tag:"ip_protection",patterns:["how do i protect my business idea?","how do i protect my intellectual property?","what types of ip protection exist?"],responses:["IP protection types: Patent (inventions — expensive, 20 years, must apply before public disclosure), Trademark (brand names, logos — register to gain wider protection), Copyright (creative works — automatic, no registration needed), Trade Secret (confidential processes — protect via NDAs and access controls). 🔒","IP strategy: register your trademark before you launch (squatters and competitors move fast), file a provisional patent if you have an invention worth protecting, use copyright notices on all content, and make every employee and contractor sign an IP assignment agreement. 📜"]},
{tag:"gdpr_compliance",patterns:["what is gdpr?","how do i make my business gdpr compliant?","does gdpr apply to my business?"],responses:["GDPR (General Data Protection Regulation) applies to any business processing personal data of EU/UK residents — regardless of where the business is located. It requires lawful basis for processing, privacy notices, data subject rights (access, deletion), and breach notification within 72 hours. 🔐","GDPR compliance essentials: privacy policy, cookie consent, data processing records, lawful basis documentation, vendor data processing agreements, and a breach response plan. Fines reach €20M or 4% of global annual revenue — whichever is higher. Don't ignore this. ⚠️"]},

// ============================================================
// BLOCK 16: HR & EMPLOYMENT LAW
// ============================================================
{tag:"at_will_employment",patterns:["what is at-will employment?","can i fire someone without reason?","what are wrongful termination laws?"],responses:["At-will employment (US) means either party can end the employment relationship at any time for any lawful reason (or no reason). However, terminations cannot be for illegal reasons: race, gender, religion, disability, retaliation for whistleblowing, etc. 'At-will' doesn't mean 'fire freely'. ⚖️","Wrongful termination risk: even in at-will states, employers face liability for discrimination, retaliation, or breach of implied contract (verbal promises of job security). Document performance issues thoroughly before terminating, and consult an employment lawyer before firing any protected-class employee. 📋"]},
{tag:"employee_vs_contractor",patterns:["what is the difference between an employee and a contractor?","how do i classify workers?","what are the risks of misclassifying employees?"],responses:["Employee vs Contractor: employees work under the company's direction (when, where, how); contractors work independently. IRS tests for US classification: behavioral control, financial control, and type of relationship. Misclassification is a major legal risk. ⚖️","Misclassifying employees as contractors to avoid benefits and taxes is one of the most costly business mistakes — it can result in back taxes, penalties, and employee lawsuits. If in doubt, treat the person as an employee or get legal advice. The cost of compliance is far less than the cost of a misclassification audit. ⚠️"]},
{tag:"performance_management",patterns:["how do i manage employee performance?","what is a performance improvement plan?","how do i conduct a performance review?"],responses:["Performance management: set clear goals (SMART objectives), provide regular feedback (not just annual reviews), have honest conversations early when performance dips, and document everything. Annual reviews without ongoing feedback are counterproductive. 📋","A Performance Improvement Plan (PIP) should: specify the performance gap clearly, set measurable improvement targets, provide a reasonable timeline (30-90 days), offer support (training, coaching), and document the consequences of non-improvement. PIPs protect the company legally and give employees a genuine chance to improve. 📊"]},
{tag:"onboarding_employees",patterns:["how do i onboard a new employee?","what should employee onboarding include?","how long should onboarding take?"],responses:["Effective onboarding: Day 1 (welcome, IT setup, team introductions, culture overview), Week 1 (role clarity, key relationships, product/service deep dive), Month 1 (first project ownership, 1:1 with manager), 90 days (performance review against initial goals). 📋","Research: employees who experience great onboarding are 69% more likely to stay 3 years. Bad onboarding (confusion, lack of direction, isolation) triggers regret and early exits. Invest in a structured programme — it pays back in retention and time-to-productivity. 🌟"]},
{tag:"employee_benefits",patterns:["what employee benefits should i offer?","how do i design a benefits package?","what benefits do employees value most?"],responses:["Most valued employee benefits (2024 surveys): health insurance (top priority), flexible working hours, remote work options, pension/retirement contributions, paid parental leave, and professional development budget. Cash is not the most important thing — flexibility often is. 💙","Benchmarking benefits: use survey data (Mercer, Willis Towers Watson) or industry reports to ensure your package is competitive. Undercutting competitors on benefits while matching on salary is a false economy — candidates evaluate total compensation, not just salary. 📊"]},
{tag:"workplace_harassment",patterns:["what is workplace harassment?","how do i handle a harassment complaint?","what should i do if an employee reports harassment?"],responses:["Workplace harassment is unwanted conduct related to a protected characteristic (gender, race, disability, etc.) that creates a hostile environment. All employers have a legal duty to prevent and address it. 'I didn't know' is not a defence. ⚖️","Handling a harassment complaint: take it seriously (never dismiss), conduct a prompt and impartial investigation (use HR or external investigators for serious allegations), document everything, take appropriate action, and protect the complainant from retaliation. Get legal advice before disciplining anyone. 📋"]},
{tag:"overtime_law",patterns:["what are the rules for overtime pay?","when must i pay overtime?","how does overtime work for employees?"],responses:["US overtime law (FLSA): non-exempt employees must receive 1.5× their regular pay for hours over 40 per week. Many employees are 'exempt' from overtime (salaried professionals above $684/week threshold, executive roles). State laws sometimes add requirements. ⚖️","Overtime compliance tip: correctly classifying employees as exempt or non-exempt is critical. Misclassification and unpaid overtime are among the most common (and expensive) wage and hour violations. Audit your classifications annually, especially when roles change. 📋"]},
{tag:"redundancy_layoffs",patterns:["how do i lay off employees legally?","what is redundancy pay?","how do i handle layoffs in my company?"],responses:["Laying off employees legally: document the business reason (restructuring, cost reduction — not performance, which is a different process), follow required notice periods, pay any redundancy/severance owed, consider selection criteria for multiple redundancies (objective, non-discriminatory), and offer outplacement support if possible. ⚖️","Layoff communication: be direct, humane, and private. Never lay off over email alone. Tell the affected person personally, explain the business reason clearly, provide all entitlements, and give them time to process. How you treat exiting employees affects your reputation with remaining ones. 💙"]},

// ============================================================
// BLOCK 17: WORKPLACE CULTURE & PSYCHOLOGY
// ============================================================
{tag:"company_culture_building",patterns:["how do i build a strong company culture?","what makes a great workplace culture?","how do i create good culture in my business?"],responses:["Culture is built through consistent action, not mission statements. Define 3-5 core values and then make hiring, promotion, and dismissal decisions based on them. Culture is what you DO when no one is looking — not what you say in an all-hands. 🌟","Culture-building tools: values-based hiring, recognition programmes (catch people doing things right), transparent communication (share financials and strategy widely), psychological safety (make it safe to disagree), and handling bad culture fits quickly. 🎯"]},
{tag:"psychological_safety",patterns:["what is psychological safety?","how do i create psychological safety in my team?","why is psychological safety important at work?"],responses:["Psychological safety (Amy Edmondson, Harvard): the belief that you can speak up, take risks, make mistakes, or share ideas without fear of punishment. Google's Project Aristotle found it's the #1 predictor of high-performing teams. 🧠","Building psychological safety: model it as a leader (acknowledge your own mistakes publicly), reward dissent (thank people for challenging ideas), never punish honest reporting of bad news, and make it normal to say 'I don't know'. Teams where people feel safe outperform those where they're afraid. 🌟"]},
{tag:"employee_engagement",patterns:["how do i increase employee engagement?","what causes low employee engagement?","why is employee engagement important?"],responses:["Employee engagement drivers: meaningful work, autonomy over how they do it, recognition that they matter, a manager who cares about their development, and belief in the company's mission. Gallup research: only 23% of employees globally are engaged — a massive performance opportunity. 📊","Low engagement causes: poor management (most common), unclear expectations, no growth opportunities, lack of recognition, and feeling that their work doesn't matter. Engagement surveys help — but only if you act on the findings. Nothing kills engagement faster than a survey whose results are ignored. 💡"]},
{tag:"servant_leadership",patterns:["what is servant leadership?","how do i practice servant leadership?","why is servant leadership effective?"],responses:["Servant Leadership (Robert Greenleaf): leaders exist to serve their teams — removing obstacles, developing people, and prioritising the team's wellbeing over their own status. It inverts the traditional hierarchy. The leader is at the bottom, serving those who serve customers. 🌟","Servant leadership in practice: asking 'What can I do to help?' instead of 'Why isn't this done?', sharing credit rather than taking it, developing your replacement at every level, and making decisions that serve the team's long-term success over the leader's short-term ego. 💡"]},
{tag:"imposter_syndrome",patterns:["what is imposter syndrome?","how do i deal with imposter syndrome at work?","is imposter syndrome common in business?"],responses:["Imposter syndrome: feeling like a fraud — believing you don't deserve your success and fear being 'found out'. Studies show 70% of people experience it. It's paradoxically most common in high achievers and in new situations (new job, promotion, first company). 🧠","Dealing with imposter syndrome: recognise it's normal (even CEOs of Fortune 500s experience it), keep a 'wins journal' (documented evidence of your competence), separate feelings from facts, and talk about it with trusted colleagues — you'll discover they feel it too. 💡"]},
{tag:"decision_fatigue",patterns:["what is decision fatigue?","how do i avoid decision fatigue as a business owner?","why is decision making hard when tired?"],responses:["Decision fatigue: the quality of decisions deteriorates after making many decisions — depleting cognitive resources. Famous examples: Obama and Zuckerberg wearing the same clothes daily to eliminate trivial decisions and preserve mental energy for important ones. 🧠","Combat decision fatigue: make your most important decisions early (before decision fatigue sets in), create standard operating procedures for recurring decisions (removes the need to decide each time), and distinguish between reversible and irreversible decisions (be fast on reversible, careful on irreversible). 💡"]},
{tag:"growth_mindset_work",patterns:["what is a growth mindset?","how do i develop a growth mindset?","why is growth mindset important in business?"],responses:["Growth mindset (Carol Dweck, Stanford): believing that abilities and intelligence can be developed through effort, learning, and persistence — vs fixed mindset (believing talents are innate and unchangeable). Business leaders with growth mindsets build more resilient, innovative organisations. 🧠","Cultivating growth mindset in a team: celebrate effort and learning, not just outcomes; frame failures as experiments with results; use 'yet' (not 'I can't do this' but 'I can't do this YET'); and make learning and development a genuine investment priority. 🌱"]},
{tag:"cognitive_bias_business",patterns:["what cognitive biases affect business decisions?","what is confirmation bias in business?","how do biases affect business strategy?"],responses:["Key business biases: Confirmation bias (seeking information that supports existing beliefs), Sunk cost fallacy (throwing good money after bad), Anchoring (over-relying on first information), Availability bias (overweighting recent/memorable events), and Overconfidence (systematic overestimation of skill and certainty). 🧠","Countering bias: seek out disconfirming evidence deliberately, use structured decision frameworks, involve diverse perspectives (different backgrounds see different things), pre-mortem analysis (imagine the decision failed — what went wrong?), and document decisions and the reasoning behind them. 💡"]},

// ============================================================
// BLOCK 18: ECONOMICS & MARKETS
// ============================================================
{tag:"supply_demand",patterns:["how does supply and demand work?","what is the law of supply and demand?","how does supply and demand affect business?"],responses:["Supply and demand: when demand exceeds supply, prices rise; when supply exceeds demand, prices fall. Equilibrium is where supply equals demand. Understanding this helps businesses price correctly, manage inventory, and anticipate market shifts. 📊","Business application: raise prices when demand outstrips supply (you'll sell fewer but more profitably). Reduce prices (or increase marketing) when supply exceeds demand. Seasonal businesses use this constantly — pricing hotel rooms higher on peak dates, lower on off-peak. 💡"]},
{tag:"inflation_business",patterns:["how does inflation affect my business?","what should i do during inflation?","how do i protect my business from inflation?"],responses:["Inflation impact on business: input costs rise (raw materials, labour, energy), eroding margins unless prices are raised. Debt becomes cheaper (you repay in less valuable currency). Customers become more price-sensitive. Businesses with pricing power survive best. 📊","Protecting against inflation: raise prices proactively (waiting erodes margins), lock in long-term supplier contracts at current prices, reduce variable costs through automation, focus on premium/high-value segments (less price-sensitive), and use real assets (property, inventory) as inflation hedges. 💡"]},
{tag:"interest_rates_business",patterns:["how do interest rates affect businesses?","what happens to business when interest rates rise?","should i borrow money when interest rates are high?"],responses:["Rising interest rates: increase borrowing costs (loans, credit lines, mortgages), reduce consumer spending (less discretionary income), slow investment (higher hurdle rate for ROI), and strengthen the currency (hurts exporters). Capital-heavy businesses feel it most. 📊","Business strategy in high interest rate environment: delay non-essential capital expenditure, pay down variable-rate debt quickly, focus on cash generation over growth, and consider fixed-rate borrowing to lock in before further rises. Cash-rich businesses actually benefit — their savings earn more. 💡"]},
{tag:"recession_business",patterns:["how do i survive a recession?","what should i do in a recession?","how does a recession affect small business?"],responses:["Recession survival: cut variable costs fast (before cash runs out), protect your best customers aggressively (revenue retention), maintain your best employees (avoid regret layoffs you'll pay for in recovery), and conserve cash ruthlessly. Companies that survive recessions often emerge with more market share. 📊","Recession opportunity: competitors close, talent becomes available, commercial property gets cheaper, and acquisition targets emerge at lower valuations. Businesses with cash reserves during recessions gain market share from distressed competitors. The best time to invest is when others can't. 💡"]},
{tag:"gdp_business",patterns:["what is gdp and why does it matter for business?","how does gdp affect business?","what does gdp measure?"],responses:["GDP (Gross Domestic Product) measures the total economic output of a country. Rising GDP = economy growing (good for business, consumer spending up); falling GDP for two quarters = recession (warning for business). It's the most watched economic indicator. 📊","GDP growth correlation: most businesses grow when GDP grows and struggle when it contracts. But sector matters — consumer staples (food, healthcare) are recession-resistant; luxury goods and construction are cyclical. Know your sector's correlation to GDP. 💡"]},
{tag:"market_monopoly",patterns:["what is a monopoly in business?","what is a market monopoly?","how do monopolies affect competition?"],responses:["A monopoly is when one company dominates an entire market — controlling supply and pricing without competitive pressure. True monopolies are rare and often illegal (antitrust law), but near-monopolies exist: Google in search (90%+ market share), Microsoft in enterprise software. 📊","Market power enables pricing power — monopolists can charge more than competitive markets allow. This is why antitrust regulators break up monopolies or regulate them as utilities. For businesses, near-monopoly positions in a niche (even a small one) create extraordinary profitability. 💡"]},
{tag:"market_share",patterns:["what is market share?","how do i calculate market share?","how do i grow market share?"],responses:["Market share = (Your Revenue ÷ Total Market Revenue) × 100. It shows your position relative to competitors. Growing market share while the total market grows = excellent. Growing market share while the market shrinks = stealing from competitors. Both can be good. 📊","Growing market share: better product (earn it), better distribution (reach more buyers), better pricing strategy (win on value not just price), and capturing competitor customers during their weaknesses (product failures, price increases, customer service failures). 🎯"]},
{tag:"price_elasticity",patterns:["what is price elasticity?","how does price elasticity affect business?","what is an inelastic product?"],responses:["Price elasticity measures how demand changes when price changes. Elastic products (luxury goods, entertainment) — demand drops significantly when price rises. Inelastic products (medicine, gasoline, staple foods) — demand holds even when price rises. 📊","Business strategy: inelastic products have pricing power — raise prices without losing proportionate volume. Elastic products require careful pricing — small increases can tank volume. Differentiate your product to move from elastic to inelastic territory. 💡"]},
{tag:"oligopoly",patterns:["what is an oligopoly?","what industries are oligopolies?","how does an oligopoly affect business strategy?"],responses:["An oligopoly is a market dominated by a small number of large firms — airlines, telecom, banking, oil, and grocery retail. Oligopolists watch each other's moves closely and often avoid price wars because everyone would lose. 📊","Competing in an oligopoly: if you're a new entrant, don't compete directly on price — the incumbents will outspend you. Compete on a specific underserved segment, superior customer experience, or technology disruption. Virgin Atlantic entered against British Airways by being the 'fun airline.' 💡"]},

// ============================================================
// BLOCK 19: REAL ESTATE BUSINESS
// ============================================================
{tag:"property_investment",patterns:["how do i invest in property?","is real estate a good investment?","how do i start investing in real estate?"],responses:["Real estate investment basics: buy in areas with rising population and employment (demand driver), calculate gross yield (annual rent ÷ purchase price × 100 — 5%+ is generally good), factor in costs (mortgage, maintenance, management fees, tax), and understand that leverage amplifies both gains and losses. 🏠","Real estate investment types: buy-to-let (residential rental), commercial property (office, retail, industrial), REITs (Real Estate Investment Trusts — invest without owning property directly), fix-and-flip (buy distressed, renovate, sell), and development (highest return, highest risk). 📊"]},
{tag:"rental_yield",patterns:["what is rental yield?","how do i calculate rental yield?","what is a good rental yield?"],responses:["Gross rental yield = (Annual rent ÷ Property value) × 100. A 6% gross yield means you earn 6% of the property's value annually in rent before expenses. Net yield deducts costs (management fees, maintenance, insurance, voids). Net yield of 4-5%+ in most markets is solid. 📊","Rental yield vs capital appreciation: high-yield areas (often outside city centres) give strong income but less capital growth. Low-yield areas (prime city centres) give less income but stronger capital appreciation. Know which you're optimising for. 💰"]},
{tag:"real_estate_business",patterns:["how do i start a real estate business?","what types of real estate businesses exist?","how do i make money in real estate?"],responses:["Real estate business types: property management (manage properties for landlords — recurring revenue), estate agency/brokerage (earn commission on sales), property development (buy land, build, sell — high capital, high return), real estate investment (hold properties for rental income and appreciation). 🏢","Starting in real estate: most successful real estate entrepreneurs start by investing personally (learn the market from the inside), then build a portfolio, then transition to managing properties for others or developing. The learning curve is steep — invest in education and mentorship early. 📚"]},
{tag:"cap_rate",patterns:["what is cap rate in real estate?","how do i calculate cap rate?","what is a good cap rate?"],responses:["Cap Rate (Capitalisation Rate) = Net Operating Income ÷ Property Value. A property generating $50,000 NOI worth $1,000,000 has a 5% cap rate. It represents the unlevered return on investment. Higher cap rates = higher yield but often higher risk. 📊","Cap rate benchmarks: 4-5% in prime urban areas (high prices, low risk), 6-8% in suburban/secondary cities, 9%+ in rural/high-risk areas. Comparing cap rates across similar properties reveals relative value — buy below market cap rate cautiously (you're paying for expected growth). 💰"]},
