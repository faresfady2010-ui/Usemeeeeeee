body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background-color 0.3s; }

body.dark .chat-header { background-color: #0f3460; }

.chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; border-bottom: 1px solid #eee; }

.message { margin-bottom: 10px; clear: both; overflow-wrap: break-word; }

body.dark .message.user { background-color: #1e4d7b; color: #e0e0e0; }
.message.bot { background-color: #f0f0f0; color: #000; padding: 8px 12px; border-radius: 15px; float: left; max-width: 70%; margin-right: auto; text-align: left; }
body.dark .message.bot { background-color: #2a2a4a; color: #e0e0e0; }
.chat-input-area { display: flex; flex-direction: column; padding: 15px; border-top: 1px solid #eee; background-color: #fff; }
body.dark .chat-input-area { background-color: #16213e; border-top: 1px solid #0f3460; }
#suggestWrapper { position: relative; margin-bottom: 10px; }
#suggestBtn { background-color: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 5px; }
#suggestBtn:hover { background-color: #0056b3; }
#suggestBox { position: absolute; bottom: 40px; left: 0; background: #222; color: white; padding: 10px; border-radius: 8px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; max-height: 200px; overflow-y: auto; z-index: 10; }
#closeBtn { float: right; background: red; border: none; color: white; cursor: pointer; }
.suggestion { cursor: pointer; padding: 5px; }
.suggestion:hover { background: #444; }
.chat-input-area input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; background-color: #fff; color: #000; }
body.dark .chat-input-area input { background-color: #0f3460; color: #e0e0e0; border: 1px solid #444; }
.chat-input-area .send-btn { background-color: #28a745; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; color: white; cursor: pointer; }
.chat-input-area .send-btn:hover { background-color: #218838; }
.message.loading { font-style: italic; opacity: 0.7; }
</style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">usemee</div>
    <div class="nav-buttons">
        <button onclick="openPage('index.html')">Home</button>
        <button onclick="openPage('about.html')">About</button>
        <button onclick="openPage('settings.html')">Settings</button>
    </div>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-area">
        <div id="suggestWrapper">
            <button id="suggestBtn">💡 Suggestions</button>
            <div id="suggestBox">
                <button id="closeBtn">✖</button>
                <p class="suggestion">what is business</p>
                <p class="suggestion">what is the purpose of business</p>
            </div>
        </div>
        <div style="display: flex;">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

// Simple similarity function (Levenshtein distance)
function similarity(s1, s2) {
    s1 = s1.toLowerCase();
    s2 = s2.toLowerCase();
    const longer = s1.length > s2.length ? s1 : s2;
    const shorter = s1.length > s2.length ? s2 : s1;
    const longerLength = longer.length;
    if(longerLength === 0) return 1.0;
    const editDistance = levenshteinDistance(longer, shorter);
    return (longerLength - editDistance) / parseFloat(longerLength);
}

// Levenshtein distance
function levenshteinDistance(a, b){
    const matrix = Array.from({length: b.length+1}, (_,i)=>Array(a.length+1).fill(0));
    for(let i=0;i<=b.length;i++) matrix[i][0]=i;
    for(let j=0;j<=a.length;j++) matrix[0][j]=j;
    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            const cost = a[j-1]===b[i-1]?0:1;
            matrix[i][j] = Math.min(
                matrix[i-1][j]+1,
                matrix[i][j-1]+1,
                matrix[i-1][j-1]+cost
            );
        }
    }
    return matrix[b.length][a.length];
}

// Updated findResponse using similarity
function findResponse(input) {
    input = input.toLowerCase();
    let bestMatch = null;
    let bestScore = 0.0;

    for(const intent of intents){
        for(const pattern of intent.patterns){
            const score = similarity(input, pattern);
            if(score > bestScore){
                bestScore = score;
                bestMatch = intent;
            }
        }
    }

    // Threshold for typo tolerance
    if(bestScore > 0.6){ // Adjust 0.6 for stricter or more lenient matching
        return bestMatch.responses[Math.floor(Math.random()*bestMatch.responses.length)];
    }

    return "I'm sorry, I didn't understand that. Could you rephrase your question?";
}

// Typing animation helper
function typeText(messageDiv, text, speed = 30) {
    messageDiv.textContent = "";
    let i = 0;
    const interval = setInterval(() => {
        messageDiv.textContent += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, speed);
}

function openPage(page) { window.location.href = page; }

function addMessage(text, sender, id=null, typing=false) {
    const chatBox = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', sender);
    if(id) msgDiv.id = id;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    if(typing){
        typeText(msgDiv, text, 20);
    } else {
        msgDiv.textContent = text;
    }
}

// Simple intent matching
function findResponse(input) {
    input = input.toLowerCase();
    for(const intent of intents){
        for(const pattern of intent.patterns){
            if(input.includes(pattern.toLowerCase())){
                // Pick a random response if multiple
                return intent.responses[Math.floor(Math.random()*intent.responses.length)];
            }
        }
    }
    return "I'm sorry, I didn't understand that. Could you rephrase your question?";
}

async function sendMessage() {
    const userInput = $("#user-input").val().trim();
    if(!userInput) return;

    addMessage(userInput, 'user');
    $("#user-input").val("");

    const loadingId = "msg-" + Date.now();
    addMessage("Thinking...", 'bot', loadingId);

    // Simulate typing delay
    setTimeout(()=>{
        const botReply = findResponse(userInput);
        const msgDiv = document.getElementById(loadingId);
        msgDiv.classList.remove('loading');
        typeText(msgDiv, botReply, 20);
    }, 1000 + Math.random()*1000); // Random delay to feel like AI
}

// Enter key to send
$("#user-input").on('keypress', function(e){ if(e.key==='Enter') sendMessage(); });

// Suggestions toggle
$("#suggestBtn").click(()=>$("#suggestBox").toggle());
$("#closeBtn").click(()=>$("#suggestBox").hide());
$(".suggestion").click(function(){
    $("#user-input").val($(this).text());
    sendMessage();
    $("#suggestBox").hide();
});

// Dark mode from settings
if(localStorage.getItem('darkMode')==='enabled') document.body.classList.add('dark');

window.onload = ()=>{
    addMessage("Hello! I'm your AI assistant. Ask me anything about business, entrepreneurship, or starting your own company.", 'bot', null, true);
}
</script>
